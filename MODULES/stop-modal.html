<!-- STOP MODAL CONTENT - VERSION 2.0 (NO FLOATING BARS) -->
<div class="stop-modal-container">
    <div class="stop-modal-header">
        <h2 id="modalCompanyName">Customer Name</h2>
        <button class="close-modal-btn" onclick="closeStopPopout()">&times;</button>
    </div>

    <div class="stop-info-grid">
        <!-- Delivery Details Section -->
        <div class="info-group">
            <label><i class="fas fa-map-marker-alt"></i> Delivery Address</label>
            <div id="modalAddress" class="info-value">--</div>
        </div>
        
        <div class="info-group">
            <label><i class="fas fa-phone"></i> Contact Phone</label>
            <div id="modalPhone" class="info-value">--</div>
        </div>
    </div>

    <hr>

    <!-- Product / Order Section -->
    <div class="order-section">
        <h3>Current Order</h3>
        <table class="order-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="modalProductList">
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>

    <div class="modal-footer-actions">
        <button class="action-btn complete-btn" onclick="completeStop()">
            <i class="fas fa-check-circle"></i> Complete Delivery
        </button>
        <button class="action-btn skip-btn" onclick="skipStop()">
            <i class="fas fa-forward"></i> Skip Stop
        </button>
    </div>
</div>

<style>
    /* Scope styles strictly to the modal to prevent 'leaking' to the map */
    .stop-modal-container {
        padding: 20px;
        color: #333;
        font-family: sans-serif;
    }

    .stop-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .close-modal-btn {
        font-size: 2rem;
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
    }

    .stop-info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .info-group label {
        display: block;
        font-weight: bold;
        font-size: 0.8rem;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 5px;
    }

    .info-value {
        font-size: 1.1rem;
        font-weight: 500;
    }

    .order-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    .order-table th {
        text-align: left;
        background: #f4f4f4;
        padding: 10px;
    }

    .order-table td {
        padding: 10px;
        border-bottom: 1px solid #eee;
    }

    .modal-footer-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }

    .action-btn {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .complete-btn { background: #28a745; color: white; }
    .skip-btn { background: #6c757d; color: white; }
</style>
