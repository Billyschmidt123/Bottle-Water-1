<!-- CALL-IN MODAL (Bottle-Water) -->
<div id="callinModal" class="modal-overlay" style="display:none;">
  <div class="modal-window">

    <div class="modal-header">
      <h2>Call‑In Order</h2>
      <button class="modal-close" onclick="closeCallInModal()">×</button>
    </div>

    <div class="modal-body">

      <!-- CUSTOMER INFO -->
      <div class="modal-section">
        <label>Customer Name</label>
        <input id="ci_name" type="text">

        <label>Phone Number</label>
        <input id="ci_phone" type="text">

        <label>Delivery Date</label>
        <input id="ci_date" type="date">
      </div>

      <!-- PRODUCT LIST -->
      <div class="modal-section">
        <h3>Products</h3>
        <div id="ci_productList"></div>
      </div>

      <!-- NOTES -->
      <div class="modal-section">
        <label>Notes</label>
        <textarea id="ci_notes"></textarea>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeCallInModal()">Cancel</button>
      <button class="btn-primary" onclick="saveCallInOrder()">Save Order</button>
    </div>

  </div>
</div>
