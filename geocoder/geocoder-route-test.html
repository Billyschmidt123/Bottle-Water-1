<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Route Geocoder Test</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #stopList {
            width: 320px;
            background: #ffffff;
            border-right: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
        }

        .stop-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .stop-item:hover {
            background: #f0f8ff;
        }

        #rightSide {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #topBar {
            padding: 10px;
            background: #004a99;
            color: white;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #addressInput {
            flex: 1;
            padding: 8px;
            font-size: 1rem;
        }

        #controls {
            padding: 6px 10px;
            background: #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        button {
            padding: 8px 14px;
            background: #28a745;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 0.95rem;
            border-radius: 4px;
        }
        button:hover {
            background: #218838;
        }

        #status {
            font-size: 0.85rem;
            color: #333;
        }
    </style>
</head>

<body>

    <div id="stopList">
        <h3>Stops</h3>
        <div id="stopItems"></div>
    </div>

    <div id="rightSide">

        <div id="topBar">
            <input id="addressInput" type="text" placeholder="Enter address or LLD">
            <button onclick="runSingleGeocode()">Geocode</button>
        </div>

        <div id="controls">
            <input type="file" id="routeFile" accept=".csv">
            <button onclick="loadRouteCSV()">Load CSV</button>
            <button onclick="geocodeRoute()">Geocode Route</button>
            <span id="status"></span>
        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([55.1707, -118.794], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        let singleMarker = null;
        let routeMarkers = [];
        let routeRows = [];
        let routeHeaders = [];

        const stopItems = document.getElementById("stopItems");
        const statusEl = document.getElementById("status");

        async function geocodeCivic(addr) {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`;
            const r = await fetch(url);
            const j = await r.json();
            if (!Array.isArray(j) || j.length === 0) return null;
            return { lat: parseFloat(j[0].lat), lon: parseFloat(j[0].lon) };
        }

        async function geocodeLLDAlberta(lld) {
            const url = `https://geospatial.alberta.ca/townshipgrid/lltosrs?ll=${encodeURIComponent(lld)}&srs=4326`;
            const r = await fetch(url);
            if (!r.ok) return null;

            const j = await r.json();
            if (!j || j.latitude == null || j.longitude == null) return null;

            return { lat: parseFloat(j.latitude), lon: parseFloat(j.longitude) };
        }

        async function geocodeLLDBC(lld) {
            const url = `https://apps.gov.bc.ca/pub/bcgnws/names/LLD?value=${encodeURIComponent(lld)}`;
            const r = await fetch(url);
            if (!r.ok) return null;

            const j = await r.json();
            if (!j || j.latitude == null || j.longitude == null) return null;

            return { lat: parseFloat(j.latitude), lon: parseFloat(j.longitude) };
        }

        function isAlbertaLLD(text) {
            return /^\d+-\d+-\d+-\d+-W[4-6]$/i.test(text.trim());
        }

        function isBCLLD(text) {
            const t = text.toLowerCase();
            return t.startsWith("dl") || t.includes(" district");
        }

        async function geocodeAny(addr) {
            addr = addr.trim();
            if (!addr) return null;

            if (isAlbertaLLD(addr)) {
                const r = await geocodeLLDAlberta(addr);
                if (r) return r;
            }

            if (isBCLLD(addr)) {
                const r = await geocodeLLDBC(addr);
                if (r) return r;
            }

            return await geocodeCivic(addr);
        }

        async function runSingleGeocode() {
            const addr = document.getElementById("addressInput").value.trim();
            if (!addr) return alert("Enter an address first.");

            statusEl.textContent = "Geocoding...";
            const result = await geocodeAny(addr);
            if (!result) return alert("No result.");

            if (singleMarker) map.removeLayer(singleMarker);
            singleMarker = L.marker([result.lat, result.lon]).addTo(map)
                .bindPopup(addr)
                .openPopup();

            map.setView([result.lat, result.lon], 15);
            statusEl.textContent = `Result: ${result.lat.toFixed(5)}, ${result.lon.toFixed(5)}`;
        }

        function parseCSV(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length < 2) return { headers: [], rows: [] };

            const headers = lines[0].split(',').map(h => h.trim());
            const rows = lines.slice(1).map(line => {
                const vals = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = (vals[i] || "").trim());
                return obj;
            });

            return { headers, rows };
        }

        function loadRouteCSV() {
            const file = document.getElementById('routeFile').files[0];
            if (!file) return alert("Choose a CSV first.");

            const reader = new FileReader();
            reader.onload = e => {
                const parsed = parseCSV(e.target.result);
                routeHeaders = parsed.headers;
                routeRows = parsed.rows;
                statusEl.textContent = `Loaded ${routeRows.length} stops.`;
                renderStopList();
            };
            reader.readAsText(file);
        }

        function detectAddressColumn() {
            return routeHeaders.find(h =>
                h.toLowerCase().includes("address") ||
                h.toLowerCase().includes("location") ||
                h.toLowerCase().includes("lld")
            );
        }

        function renderStopList() {
            stopItems.innerHTML = "";
            const addrKey = detectAddressColumn();

            routeRows.forEach((row, i) => {
                const div = document.createElement("div");
                div.className = "stop-item";
                div.textContent = `${i + 1}. ${row[addrKey] || "(no address)"}`;
                div.onclick = () => geocodeSingleStop(i);
                stopItems.appendChild(div);
            });
        }

        async function geocodeSingleStop(i) {
            const addrKey = detectAddressColumn();
            const addr = routeRows[i][addrKey];
            if (!addr) return;

            statusEl.textContent = `Geocoding stop ${i + 1}...`;

            const result = await geocodeAny(addr);
            if (!result) return;

            routeRows[i]._lat = result.lat;
            routeRows[i]._lon = result.lon;

            const m = L.marker([result.lat, result.lon]).addTo(map)
                .bindPopup(`${i + 1}. ${addr}`)
                .openPopup();

            routeMarkers.push(m);
            map.setView([result.lat, result.lon], 15);
        }

        async function geocodeRoute() {
            const addrKey = detectAddressColumn();
            if (!addrKey) return alert("No address/LLD column found.");

            routeMarkers.forEach(m => map.removeLayer(m));
            routeMarkers = [];

            let bounds = [];

            for (let i = 0; i < routeRows.length; i++) {
                const addr = routeRows[i][addrKey];
                if (!addr) continue;

                statusEl.textContent = `Geocoding ${i + 1}/${routeRows.length}: ${addr}`;
                const result = await geocodeAny(addr);
                if (!result) continue;

                routeRows[i]._lat = result.lat;
                routeRows[i]._lon = result.lon;

                const m = L.marker([result.lat, result.lon]).addTo(map)
                    .bindPopup(`${i + 1}. ${addr}`);
                routeMarkers.push(m);
                bounds.push([result.lat, result.lon]);

                await new Promise(res => setTimeout(res, 400));
            }

            if (bounds.length) {
                map.fitBounds(bounds, { padding: [30, 30] });
                statusEl.textContent = "Route geocoding complete.";
            } else {
                statusEl.textContent = "No stops geocoded.";
            }
        }
    </script>

</body>
</html>
