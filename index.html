<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogiFlow Delivery System</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin:0; padding:0; display:flex; height:100vh; overflow:hidden; }
        #sidebar { width:260px; background:#f4f4f4; overflow-y:auto; border-right:1px solid #ccc; }
        #map { flex:1; }
        #modalContainer { position:fixed; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); z-index:9999; }
        .sidebar-stop { padding:10px; border-bottom:1px solid #ddd; cursor:pointer; }
        .active-stop { background:#d0ebff; }
        .completed-stop { background:#c8f7c5; }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <button id="openManagerBtn" style="width:100%; padding:10px;">Manager Portal</button>
        <button id="btnStartRoute" style="width:100%; padding:10px;">Start Route</button>
        <button id="btnFinishRoute" style="width:100%; padding:10px;">Finish Route</button>

        <div id="currentStopInfo" style="padding:10px; font-weight:bold;">No stop selected</div>

        <button id="btnPrevStop" style="width:100%; padding:10px;">Previous Stop</button>
        <button id="btnNextStop" style="width:100%; padding:10px;">Next Stop</button>
        <button id="btnDirections" style="width:100%; padding:10px;">Directions</button>

        <div id="sidebarStops"></div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Modal -->
    <div id="modalContainer"></div>

    <!-- AppState -->
    <script>
        window.appState = {
            stops: [],
            currentStopIndex: 0,
            activeRoute: null
        };
    </script>

    <!-- Scripts (ORDER MATTERS) -->
    <script src="js/manager.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/ui.js"></script>

    <!-- Initialize Map + Systems -->
    <script>
        // Initialize Leaflet map
        window.map = L.map('map').setView([55.1707, -118.794], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Initialize modules
        navigationInit();
        uiInit();

        // Load active route (if manager already selected one)
        if (typeof loadActiveRouteForNavigation === "function") {
            loadActiveRouteForNavigation();
        }
    </script>

</body>
</html>
