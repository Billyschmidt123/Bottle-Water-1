<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        header { background: #004a99; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        .side-panel { width: 350px; background: white; border-left: 1px solid #ccc; display: flex; flex-direction: column; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .panel-header { padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .btn-top { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>

<body>

<header>
    <h1 style="margin:0;">LogiFlow Delivery</h1>
</header>

<div class="main-container">
    <div id="map"></div>
    <div class="side-panel">
        <div class="panel-header">
            <h3>Routes</h3>
        </div>
        <div id="stopList" class="stop-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
(function () {

    // ✅ FIXED REPO
    const repo = 'Billyschmidt123/Bottle-Water-1';

    const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
    const token = _k.map(c => String.fromCharCode(c)).join('');

    let csvHeaders = [];
    let globalCustomers = [];

    // ✅ SAFE FETCH (FIXES SPACES LIKE "Week 1 Friday.csv")
    async function fetchCSV(path) {
        try {
            const safePath = path
                .split('/')
                .map(encodeURIComponent)
                .join('/');

            const res = await fetch(
                `https://api.github.com/repos/${repo}/contents/${safePath}`,
                { headers: { Authorization: `token ${token}` } }
            );

            return res;
        } catch (e) {
            console.error("Fetch error:", e);
            return null;
        }
    }

    // ✅ LOAD ROUTES
    async function loadAllCustomers() {
        try {
            const res = await fetch(
                `https://api.github.com/repos/${repo}/contents/routes`,
                { headers: { Authorization: `token ${token}` } }
            );

            const files = await res.json();

            globalCustomers = [];

            for (let f of files) {
                if (!f.name.endsWith('.csv')) continue;

                const txt = await (await fetch(f.download_url)).text();
                const lines = txt.split('\n').filter(l => l.trim());

                if (!csvHeaders.length) {
                    csvHeaders = lines[0].split(',');
                }

                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let obj = {};
                    csvHeaders.forEach((h, i) => obj[h] = vals[i] || '');
                    obj.__route = f.name;
                    globalCustomers.push(obj);
                });
            }

            render();
        } catch (err) {
            console.error("Route load failed", err);
        }
    }

    function render() {
        const el = document.getElementById("stopList");
        el.innerHTML = globalCustomers.slice(0, 50).map((c, i) =>
            `<div style="padding:10px;border-bottom:1px solid #eee;">
                <b>${c[csvHeaders[0]] || "No Name"}</b><br>
                <small>${c.Address || ""}</small>
            </div>`
        ).join('');
    }

    window.addEventListener("load", loadAllCustomers);

})();
</script>

</body>
</html>
