<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        header { background: #004a99; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        .side-panel { width: 350px; background: white; border-left: 1px solid #ccc; display: flex; flex-direction: column; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .panel-header { padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .btn-top { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; position: relative; }
        .driver-nav-bar { background: #e9ecef; padding: 10px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #dee2e6; }
        .info-bar { background: #fff; border: 1px solid #ced4da; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; color: #495057; }
        .btn-nav { padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; }
        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .mgmt-table th, .mgmt-table td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .mgmt-table th { background: #f8f9fa; position: sticky; top: 0; }
    </style>
</head>

<body>
<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <h1 style="margin:0; font-size:1.5rem;">LogiFlow Delivery</h1>
        <select id="routeDropdown" class="btn-top" style="background:#0056b3;"></select>
    </div>
    <div style="display:flex; gap:10px;">
        <button id="btnManager" class="btn-top" style="background:#6c757d;">Manager</button>
        <button id="btnForceRefresh" class="btn-top" style="background:#17a2b8;"><i class="fas fa-sync"></i></button>
    </div>
</header>

<div class="main-container">
    <div id="map"></div>
    <div class="side-panel">
        <div class="panel-header">
            <h3 id="currentRouteTitle" style="margin:0 0 10px 0;">Select a Route</h3>
            <div style="font-size:0.9rem; color:#666;">
                <span id="currentAddress">---</span><br>
                <span id="currentPhone">---</span>
            </div>
        </div>
        <div id="stopList" class="stop-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
(function() {

    const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
    const token = _k.map(c => String.fromCharCode(c)).join('');
    const repo = 'Billyschmidt123/Bottle-Water-1';

    let globalCustomers = [];
    let csvHeaders = [];
    let availableRoutes = [];
    let productData = { water: [], coffee: [] };

    // 🔧 FIX ADDED: safer fetch wrapper (DOES NOT CHANGE YOUR LOGIC)
    async function fetchCSV(path) {
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;

        try {
            const res = await fetch(url, {
                headers: token ? { 'Authorization': `token ${token}` } : {}
            });

            // 🔧 FIX ADDED: debug real GitHub error
            if (!res.ok) {
                console.error("❌ GitHub API failed:", path);
                console.error("Status:", res.status);
                console.error("URL:", url);
                return null;
            }

            return res;

        } catch (e) {
            console.error("❌ Network error fetching:", path, e);

            // 🔧 FIX ADDED: fallback without token (public repo safety)
            try {
                return await fetch(url);
            } catch (err2) {
                console.error("❌ Fallback failed:", path, err2);
                return null;
            }
        }
    }

    async function loadProductData() {
        try {
            const wRes = await fetchCSV('Products/Water.csv');
            const cRes = await fetchCSV('Products/Coffee.csv');

            if (wRes && wRes.ok) {
                const wData = await wRes.json();
                const wTxt = await (await fetch(wData.download_url)).text();
                productData.water = wTxt.split('\n').slice(1).filter(l => l.trim());
            } else {
                console.warn("Water.csv not loaded");
            }

            if (cRes && cRes.ok) {
                const cData = await cRes.json();
                const cTxt = await (await fetch(cData.download_url)).text();
                productData.coffee = cTxt.split('\n').slice(1).filter(l => l.trim());
            } else {
                console.warn("Coffee.csv not loaded");
            }

        } catch (e) {
            console.warn("Product load skipped:", e);
        }
    }

    async function loadAllCustomers() {
        try {
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/routes`, {
                headers: { 'Authorization': `token ${token}` }
            });

            const files = r.ok ? await r.json() : [];

            availableRoutes = files.filter(f => f.name.endsWith('.csv')).map(f => f.name);

            const routeDropdown = document.getElementById('routeDropdown');
            routeDropdown.innerHTML =
                '<option value="">Select Route</option>' +
                availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');

            globalCustomers = [];

            for (let f of files) {
                if (!f.name.endsWith('.csv')) continue;

                const text = await (await fetch(f.download_url)).text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);

                if (csvHeaders.length === 0 && lines.length > 0) {
                    csvHeaders = lines[0].split(',').map(h => h.trim());
                }

                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let rowObj = { "__route": f.name };
                    csvHeaders.forEach((h, i) => rowObj[h] = (vals[i] || "").trim());
                    globalCustomers.push(rowObj);
                });
            }

        } catch (e) {
            console.error("Data load error", e);
        }
    }

})();
</script>

</body>
</html>
