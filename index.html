<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Bottle Water</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        header { background: #004a99; color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1100; }
        .nav-controls { background: #e9ecef; padding: 12px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #ccc; }
        .info-pill { background: white; border: 1px solid #cbd5e0; padding: 8px 15px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; color: #2d3748; flex-grow: 1; min-height: 20px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .main-view { display: flex; flex: 1; height: calc(100vh - 120px); }
        #map { flex: 7; height: 100%; border-right: 1px solid #ccc; z-index: 1; }
        .sidebar { flex: 3; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .stop-list-container { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .delivery-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; border-left: 5px solid #004a99; transition: 0.2s; }
        .delivery-card:hover { background: #f8fafc; transform: translateX(3px); }
        .btn-ui { padding: 10px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 1300px; height: 90vh; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .mgmt-table { width: 100%; border-collapse: collapse; }
        .mgmt-table th { background: #edf2f7; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e0; position: sticky; top: 0; }
        .mgmt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .search-bar { background: #003366; border: 1px solid #0056b3; color: white; padding: 8px 12px; border-radius: 4px; width: 250px; }
        .search-bar::placeholder { color: #88b0d8; }
        .c-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .c-table th, .c-table td { border: 1px solid #000; padding: 5px; font-size: 0.85rem; }
        .sig-canvas { border: 1px solid #000; background: #fafafa; width: 100%; height: 150px; cursor: crosshair; }
        .maint-input { width: 95%; padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; }
        .search-results-box { position: absolute; top: 55px; right: 250px; width: 400px; max-height: 400px; background: white; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1500; display: none; overflow-y: auto; color: #333; }
        .search-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .search-item:hover { background: #f0f7ff; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="margin:0; font-size:1.5rem;"><i class="fas fa-tint"></i> Culligan Delivery</h1>
        <select id="routeDropdown" onchange="loadSelectedRoute()" style="background:#003366; color:white; border:1px solid #0056b3; padding:8px; border-radius:4px; font-weight:bold;"></select>
    </div>
    <div style="display:flex; gap:12px; align-items: center; position: relative;">
        <input type="text" id="globalSearch" class="search-bar" placeholder="Search All Routes..." onkeyup="handleGlobalSearch(this.value)">
        <div id="searchResults" class="search-results-box"></div>
        <button class="btn-ui" style="background:#6c757d;" onclick="openModal('mgrModal')"><i class="fas fa-user-shield"></i> Manager Portal</button>
    </div>
</header>

<div class="nav-controls">
    <button class="btn-ui" style="background: #28a745;" onclick="alert('GPS Logged')"><i class="fas fa-play"></i> START</button>
    <div id="activeAddress" class="info-pill">Address: ---</div>
    <div id="activePhone" class="info-pill" style="flex-grow: 0; min-width: 180px;">Phone: ---</div>
    <button class="btn-ui" style="background: #6f42c1;" onclick="alert('Optimizing...')"><i class="fas fa-magic"></i> OPTIMIZE</button>
</div>

<div class="main-view">
    <div id="map"></div>
    <div class="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee; background:#f8fafc;">
            <h3 style="margin:0;">Route Manifest</h3>
        </div>
        <div id="stopList" class="stop-list-container">
            <div style="text-align:center; padding-top:40px; color:#a0aec0;">Select a route or search above.</div>
        </div>
    </div>
</div>

<!-- Manager Hub -->
<div id="mgrModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px; height: auto;">
        <div style="background:#004a99; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-tasks"></i> Management Hub</h3>
            <button onclick="closeModal('mgrModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:25px; display: flex; flex-direction: column; gap: 15px;">
            <button class="btn-ui" style="background:#007bff; justify-content: center; padding: 15px;" onclick="openCustomerMaintenance()"><i class="fas fa-users-cog"></i> Customer Maintenance</button>
            <button class="btn-ui" style="background:#6610f2; justify-content: center; padding: 15px;" onclick="alert('Product logic loaded.')"><i class="fas fa-boxes"></i> Product Maintenance</button>
            <button class="btn-ui" style="background:#28a745; justify-content: center; padding: 15px;" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
        </div>
    </div>
</div>

<!-- Customer Maintenance -->
<div id="custMaintModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#007bff; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-address-book"></i> Customer Maintenance</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="saveAllCustomers()" class="btn-ui" style="background:#28a745;"><i class="fas fa-save"></i> Save Changes</button>
                <button onclick="closeModal('custMaintModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;">
            <table class="mgmt-table">
                <thead>
                    <tr>
                        <th style="width:100px;">ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="custMaintBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Delivery Slip -->
<div id="stopModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#28a745; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-file-invoice"></i> Delivery Slip</h3>
            <button onclick="closeModal('stopModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div id="slipPreview" style="padding:20px; flex:1; overflow-y:auto; background:#f0f2f5;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, markers = [];
    const warehouseCoord = [55.1707, -118.7947];
    const REPO_OWNER = "Billyschmidt123";
    const REPO_NAME = "Bottle-Water-1";
    const REPO_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    
    let allRouteData = []; // Cache for global search
    let currentRouteStops = [];
    let globalProducts = [];

    async function initApp() {
        map = L.map('map').setView(warehouseCoord, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(warehouseCoord).addTo(map).bindPopup("Warehouse");
        await loadDynamicRoutes();
        await preCacheAllRoutes(); // Load data for search
    }

    async function loadDynamicRoutes() {
        const dropdown = document.getElementById('routeDropdown');
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const files = await res.json();
            let options = files.filter(f => f.name.endsWith('.csv'))
                               .map(f => `<option value="${f.path}">${f.name.replace('.csv','')}</option>`);
            dropdown.innerHTML = '<option value="">-- Select Route --</option>' + options.join('');
        } catch (e) { console.error("Header load failed"); }
    }

    async function preCacheAllRoutes() {
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const files = await res.json();
            for (let file of files) {
                if (!file.name.endsWith('.csv')) continue;
                const contentRes = await fetch(file.download_url);
                const text = await contentRes.text();
                const lines = text.split('\n').slice(1);
                lines.forEach(line => {
                    const p = line.split(',');
                    if (p[0]) {
                        allRouteData.push({
                            id: p[0].trim(),
                            name: p[3]?.trim() || p[0].trim(),
                            address: [p[4], p[5], p[6]].filter(Boolean).join(' '),
                            routeFile: file.path,
                            routeName: file.name.replace('.csv','')
                        });
                    }
                });
            }
        } catch (e) { console.warn("Caching failed"); }
    }

    function handleGlobalSearch(query) {
        const resultsBox = document.getElementById('searchResults');
        if (query.length < 2) { resultsBox.style.display = 'none'; return; }
        
        const filtered = allRouteData.filter(c => 
            c.name.toLowerCase().includes(query.toLowerCase()) || 
            c.address.toLowerCase().includes(query.toLowerCase())
        ).slice(0, 10);

        if (filtered.length > 0) {
            resultsBox.innerHTML = filtered.map(c => `
                <div class="search-item" onclick="jumpToCustomer('${c.routeFile}', '${c.id}')">
                    <strong>${c.name}</strong><br>
                    <small>${c.address} (${c.routeName})</small>
                </div>
            `).join('');
            resultsBox.style.display = 'block';
        } else {
            resultsBox.innerHTML = '<div style="padding:10px;">No matches found.</div>';
            resultsBox.style.display = 'block';
        }
    }

    async function jumpToCustomer(filePath, customerId) {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('routeDropdown').value = filePath;
        await loadSelectedRoute();
        const stop = currentRouteStops.find(s => s.id === customerId);
        if (stop) openStopSlip(stop);
    }

    async function loadSelectedRoute() {
        const path = document.getElementById('routeDropdown').value;
        if (!path) return;
        try {
            const res = await fetch(`${REPO_BASE}/${path}`);
            const json = await res.json();
            const text = atob(json.content);
            const lines = text.split('\n').filter(l => l.trim() !== '').slice(1);
            currentRouteStops = lines.map(line => {
                const p = line.split(',');
                return { id: p[0].trim(), company: p[3]?.trim() || 'Customer', address: [p[4], p[5], p[6]].filter(Boolean).join(' '), phone: p[2] || '---' };
            });
            renderManifest();
        } catch (e) { alert("Error loading route data."); }
    }

    function renderManifest() {
        const list = document.getElementById('stopList');
        list.innerHTML = currentRouteStops.map((stop, i) => `
            <div class="delivery-card" onclick="openStopSlip(currentRouteStops[${i}])">
                <strong>${i+1}. ${stop.company}</strong><br><small>${stop.address}</small>
            </div>
        `).join('');
    }

    function openCustomerMaintenance() {
        const body = document.getElementById('custMaintBody');
        body.innerHTML = currentRouteStops.length ? currentRouteStops.map((s, i) => `
            <tr>
                <td><input type="text" class="maint-input" value="${s.id}" onchange="currentRouteStops[${i}].id=this.value"></td>
                <td><input type="text" class="maint-input" value="${s.company}" onchange="currentRouteStops[${i}].company=this.value"></td>
                <td><input type="text" class="maint-input" value="${s.address}" onchange="currentRouteStops[${i}].address=this.value"></td>
                <td><input type="text" class="maint-input" value="${s.phone}" onchange="currentRouteStops[${i}].phone=this.value"></td>
                <td><button onclick="currentRouteStops.splice(${i},1); openCustomerMaintenance();" style="color:red; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('') : '<tr><td colspan="5" style="text-align:center; padding:20px;">No customers to show. Load a route first.</td></tr>';
        openModal('custMaintModal');
    }

    function saveAllCustomers() {
        renderManifest();
        alert("Changes saved to current session.");
        closeModal('custMaintModal');
    }

    function openStopSlip(stop) {
        document.getElementById('activeAddress').innerText = stop.address;
        document.getElementById('activePhone').innerText = stop.phone;
        const preview = document.getElementById('slipPreview');
        preview.innerHTML = `
            <div style="background:white; padding:30px; border:1px solid #ccc; max-width:800px; margin:auto;">
                <h2 style="font-family:serif; color:#004a99;">Culligan Delivery</h2>
                <div style="border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:10px;">
                    <strong>CUSTOMER:</strong> ${stop.company}<br>
                    <strong>ADDRESS:</strong> ${stop.address}
                </div>
                <table class="c-table">
                    <thead><tr><th style="width:60px;">QTY</th><th>DESCRIPTION</th><th>TOTAL</th></tr></thead>
                    <tbody><tr><td colspan="3" style="text-align:center; padding:20px;">Add items to begin...</td></tr></tbody>
                </table>
            </div>
        `;
        openModal('stopModal');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
