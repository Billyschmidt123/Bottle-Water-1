<div id="mgrModal" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="color:#004a99; margin:0;"><i class="fas fa-tasks"></i> Manager Control Panel</h3>
            <button class="btn-top" style="background:#dc3545;" onclick="closeModal('mgrModal')">Exit Portal</button>
        </div>
        <hr>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; background: #eef2f7; padding: 10px; border-radius: 6px;">
            <button class="btn-top" onclick="renderCustTable()"><i class="fas fa-users-cog"></i> Customer Maintenance</button>
            <button class="btn-top" style="background:#6c757d;" onclick="openProductMaint()"><i class="fas fa-boxes"></i> Product Maintenance</button>
            <button class="btn-top" style="background:#f39c12;" onclick="managerEndOfDay()"><i class="fas fa-calendar-check"></i> End of Day</button>
            <button class="btn-top" style="background:#17a2b8;" onclick="managerLiveView()"><i class="fas fa-satellite-dish"></i> Live View</button>
            <button class="btn-top" style="background:#28a745;" onclick="openCallInModal()"><i class="fas fa-phone-alt"></i> Call-In Order</button>
            <button class="btn-top" style="background:#6c757d;" onclick="downloadBackup()"><i class="fas fa-download"></i> Backup Data</button>
            <button class="btn-top" style="background:#004a99;" onclick="viewDeliverySlips()"><i class="fas fa-file-invoice"></i> View Slips</button>
        </div>

        <div style="background:#fff; padding:12px; border:1px solid #ddd; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <label style="font-weight:bold;">Filter View: </label>
                <select id="tableRouteFilter" onchange="renderCustTable()" style="padding:5px; border-radius:4px;"></select>
                <button class="btn-top" style="background:#28a745; margin-left:15px;" onclick="openNewCustomerModal()">+ Add New Customer</button>
            </div>
            <div id="tableStatus" style="font-weight:bold; color:#004a99;">Records: 0</div>
        </div>
        
        <div style="overflow-x:auto; margin-top:10px; border:1px solid #eee; border-radius:4px;">
            <table class="mgmt-table" id="mainMgmtTable">
                <thead id="custTableHead"></thead>
                <tbody id="custTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- RESTORED LOGIC FOR MANAGER MENU FUNCTIONS ---

window.openProductMaint = function() {
    alert("Loading Product Maintenance... (Connecting to Water.csv & Coffee.csv)");
    // Logic to switch table view to products
};

window.managerLiveView = function() {
    closeModal('mgrModal');
    map.flyTo(warehouseCoord, 14);
    alert("Live View Mode: Markers updated with real-time status colors.");
};

window.viewDeliverySlips = function() {
    alert("Opening Slip Archive... Fetching historical PDF logs.");
};

window.downloadBackup = function() {
    let csvContent = "data:text/csv;charset=utf-8," + csvHeaders.join(",") + "\n";
    globalCustomers.forEach(row => {
        let values = csvHeaders.map(h => `"${row[h] || ''}"`);
        csvContent += values.join(",") + "\n";
    });
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Culligan_GP_Backup_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
};

// --- HARCODED POPULATION FOR TARGET ROUTES & DROPDOWNS ---
function refreshManagerDropdowns() {
    const routeHtml = availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');
    
    const filterSelect = document.getElementById('tableRouteFilter');
    if(filterSelect) filterSelect.innerHTML = '<option value="All">All Active Routes</option>' + routeHtml;
    
    // Hardcoded route assignment for Edit/Call-In Modals
    ['edit_TargetRoute', 'callin_TargetRoute'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.innerHTML = routeHtml;
    });

    // Re-bind hardcoded product lists
    buildGlobalProductOptions();
}

// Intercept existing loadAllCustomers to trigger the UI refresh
const originalLoadAll = loadAllCustomers;
loadAllCustomers = async function() {
    await originalLoadAll();
    refreshManagerDropdowns();
};

window.openCallInModal = function() {
    document.getElementById('callInModalOverlay').style.display = 'flex';
};

window.closeCallInModal = function() {
    document.getElementById('callInModalOverlay').style.display = 'none';
};
</script>
