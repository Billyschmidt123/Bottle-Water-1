<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery</title>

    <!-- CSS (corrected lowercase paths) -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/manager.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/callinModal.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <h1 style="margin:0; font-size:1.5rem;">LogiFlow Delivery</h1>
        <select id="routeDropdown" class="btn-top" style="background:#0056b3;">
            <option value="">Select Route</option>
        </select>
    </div>

    <div style="display:flex; gap:10px;">
        <button id="btnManager" class="btn-top" style="background:#6c757d;">Manager</button>
        <button id="btnForceRefresh" class="btn-top" style="background:#17a2b8;">
            <i class="fas fa-sync"></i>
        </button>
    </div>
</header>

<div class="driver-nav-bar">
    <button id="btnStartRoute" class="btn-nav" style="background:#28a745;">START ROUTE</button>
    <button id="btnFinishRoute" class="btn-nav" style="background:#dc3545;">FINISH</button>

    <button class="btn-nav" style="background:#6f4e37;">
        <i class="fas fa-directions"></i> DIRECTIONS
    </button>

    <div style="display:flex; gap:5px;">
        <button class="btn-nav" style="background:#007bff;" onclick="navigateStop(-1)">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="btn-nav" style="background:#007bff;" onclick="navigateStop(1)">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <!-- Required for ui.js -->
    <select id="routeDropdownMap" class="btn-top" style="background:#0056b3;">
        <option value="">Select Route</option>
    </select>

    <div id="navAddressBar" class="info-bar">Address: ---</div>
    <div id="navPhoneBar" class="info-bar" style="flex-grow:0; min-width:150px;">Phone: ---</div>
</div>

<div class="main-container">
    <div id="map"></div>

    <div class="side-panel">
        <h2 id="currentRouteTitle">Route</h2>
        <div id="stopList"></div>
    </div>
</div>

<!-- Manager Modal -->
<div id="managerModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Manager Portal</h2>
        <button id="btnAddCustomer" class="btn-top">Add Customer</button>
        <button id="btnCallIn" class="btn-top">Call-In Order</button>
        <button onclick="closeManagerModal()" class="btn-top" style="background:#dc3545;">Close</button>
    </div>
</div>

<!-- New Customer Modal -->
<div id="newCustModal" class="modal-overlay">
    <div class="modal-content">
        <h2>New Customer</h2>
        <div id="newCustFields"></div>
        <button id="btnSaveNewCustomer" class="btn-top" style="background:#28a745;">Save</button>
        <button onclick="closeNewCustomerModal()" class="btn-top" style="background:#dc3545;">Cancel</button>
    </div>
</div>

<!-- Edit Customer Modal -->
<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Edit Customer</h2>
        <div id="editFields"></div>
        <button id="btnSaveEdit" class="btn-top" style="background:#28a745;">Save</button>
        <button onclick="closeEditModal()" class="btn-top" style="background:#dc3545;">Cancel</button>
    </div>
</div>

<!-- Call-In Modal -->
<div id="callInModalOverlay" class="modal-overlay">
    <div class="modal-content callin-modal">
        <h2>Call-In Order</h2>
        <div id="callinFields"></div>
        <div id="callin_CartItems"></div>
        <button id="btnCallInSave" class="btn-top" style="background:#28a745;">Save Order</button>
        <button onclick="closeCallInModal()" class="btn-top" style="background:#dc3545;">Cancel</button>
    </div>
</div>

<!-- JS (corrected lowercase paths) -->
<script src="js/core.js"></script>
<script src="js/map.js?v=2"></script>
<script src="js/navigation.js"></script>
<script src="js/ui.js"></script>
<script src="js/manager.js"></script>
<script src="js/callin.js"></script>
<script src="js/callinModal.js"></script>
<script src="js/products.js"></script>
<script src="js/delivery.js"></script>
<script src="js/storage.js"></script>
<script src="js/split.js"></script>
<script src="js/app.js"></script>

</body>
</html>
