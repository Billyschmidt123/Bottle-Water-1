<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Bottle Water Grande Prairie</title>

    <link rel="icon" href="data:,">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f0f2f5;
            overflow: hidden;
        }

        header {
            background: #004a99;
            color: white;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 1100;
        }

        .nav-controls {
            background: #e9ecef;
            padding: 12px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }

        .info-pill {
            background: white;
            border: 1px solid #cbd5e0;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2d3748;
            flex-grow: 1;
            min-height: 20px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .main-view {
            display: flex;
            flex: 1;
            height: calc(100vh - 120px);
        }

        #map {
            flex: 7;
            height: 100%;
            border-right: 1px solid #ccc;
            z-index: 1;
        }

        .sidebar {
            flex: 3;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .stop-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fff;
        }

        .delivery-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border-left: 5px solid #004a99;
            transition: 0.2s;
        }

        .delivery-card:hover {
            background: #f8fafc;
        }

        .btn-ui {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 1300px;
            height: 90vh;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .mgmt-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .mgmt-table th {
            background: #edf2f7;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #cbd5e0;
            position: sticky;
            top: 0;
        }

        .mgmt-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

    </style>
</head>

<body>

<header>

    <div style="display:flex; align-items:center; gap:20px;">

        <h1 style="margin:0; font-size:1.6rem;">
            <i class="fas fa-truck-loading"></i>
            Culligan Bottle Water Grande Prairie
        </h1>

        <select id="routeDropdown"
                onchange="loadSelectedRoute()"
                style="
                    background:#003366;
                    color:white;
                    border:1px solid #0056b3;
                    padding:8px;
                    border-radius:4px;
                    font-weight:bold;
                ">
        </select>

    </div>

    <div style="display:flex; gap:12px;">

        <button class="btn-ui"
                style="background:#6c757d;"
                onclick="openModal('mgrModal')">

            <i class="fas fa-user-shield"></i>
            Manager Portal

        </button>

        <button class="btn-ui"
                style="background:#17a2b8;"
                onclick="location.reload()">

            <i class="fas fa-sync-alt"></i>
            Refresh

        </button>

    </div>

</header>

<div class="nav-controls">

    <button class="btn-ui"
            style="background:#28a745;"
            onclick="startRoute()">

        <i class="fas fa-play"></i>
        START ROUTE

    </button>

    <button class="btn-ui"
            style="background:#dc3545;"
            onclick="runEndOfDay()">

        <i class="fas fa-flag-checkered"></i>
        FINISH

    </button>

    <div id="activeAddress" class="info-pill">
        Address: ---
    </div>

    <div id="activePhone"
         class="info-pill"
         style="flex-grow:0; min-width:180px;">

        Phone: ---

    </div>

</div>

<div class="main-view">

    <div id="map"></div>

    <div class="sidebar">

        <div id="stopList" class="stop-list-container">

            <div style="
                text-align:center;
                padding-top:40px;
                color:#a0aec0;
            ">
                Select a route to view stops.
            </div>

        </div>

    </div>

</div>

<!-- MANAGER MODAL -->

<div id="mgrModal" class="modal-overlay">

    <div class="modal-content">

        <div style="
            background:#004a99;
            color:white;
            padding:15px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        ">

            <h2 style="margin:0;">
                <i class="fas fa-user-shield"></i>
                Manager Portal
            </h2>

            <button class="btn-ui"
                    style="background:#dc3545;"
                    onclick="closeModal('mgrModal')">

                <i class="fas fa-times"></i>
                Close

            </button>

        </div>

        <div style="padding:20px; overflow:auto; flex:1;">

            <table class="mgmt-table">

                <thead>

                    <tr>
                        <th>Section</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>Customer Maintenance</td>
                        <td>Ready</td>
                    </tr>

                    <tr>
                        <td>Products</td>
                        <td>Ready</td>
                    </tr>

                    <tr>
                        <td>Routes</td>
                        <td>Ready</td>
                    </tr>

                    <tr>
                        <td>Reports</td>
                        <td>Ready</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const REPO_OWNER = "Billyschmidt123";
const REPO_NAME = "Bottle-Water-1";

const REPO_BASE =
`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

const warehouseCoord = [55.1707, -118.7947];

let map;
let markers = [];
let globalCustomers = [];
let globalProducts = [];

function openModal(id) {

    const el = document.getElementById(id);

    if (el) {
        el.style.display = 'flex';
    }
}

function closeModal(id) {

    const el = document.getElementById(id);

    if (el) {
        el.style.display = 'none';
    }
}

window.openModal = openModal;
window.closeModal = closeModal;

async function initApp() {

    map = L.map('map').setView(warehouseCoord, 13);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    L.marker(warehouseCoord)
        .addTo(map)
        .bindPopup("Warehouse")
        .openPopup();

    await loadDynamicRoutes();
    await loadProductList();
}

async function loadProductList() {

    const productFiles = [
        "Products/Water.csv",
        "Products/Coffee.csv"
    ];

    for (const path of productFiles) {

        try {

            const res = await fetch(`${REPO_BASE}/${path}`);
            const json = await res.json();

            if (!json || !json.content) continue;

            const decoded = decodeURIComponent(
                escape(atob(json.content.replace(/\s/g, '')))
            );

            const lines = decoded
                .split(/\n/)
                .filter(l => l.trim() !== '');

            lines.slice(1).forEach(line => {

                const p = line.split(',');

                globalProducts.push({
                    name: p[0],
                    size: p[1],
                    price: parseFloat(p[2]) || 0,
                    source: path,
                    active: true
                });

            });

        } catch (e) {

            console.error("Product Load Error", e);
        }
    }
}

async function loadDynamicRoutes() {

    const dropdown =
        document.getElementById('routeDropdown');

    try {

        const res =
            await fetch(`${REPO_BASE}/routes`);

        const contents =
            await res.json();

        if (!Array.isArray(contents)) {

            dropdown.innerHTML =
                '<option value="">-- Select Route --</option>';

            return;
        }

        const files =
            contents.filter(f => f.name.endsWith('.csv'));

        dropdown.innerHTML =
            '<option value="">-- Select Route --</option>' +
            files.map(f =>
                `<option value="${f.path}">
                    ${f.name.replace('.csv', '')}
                </option>`
            ).join('');

    } catch (e) {

        console.error("Route Load Error", e);
    }
}

async function loadSelectedRoute() {

    const path =
        document.getElementById('routeDropdown').value;

    if (!path) return;

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    try {

        const res =
            await fetch(`${REPO_BASE}/${path}`);

        const json =
            await res.json();

        if (!json || !json.content) {
            console.error("Route CSV API error", json);
            return;
        }

        const decoded = decodeURIComponent(
            escape(atob(json.content.replace(/\s/g, '')))
        );

        const lines = decoded
            .split(/\n/)
            .filter(l => l.trim() !== '');

        globalCustomers = lines.slice(1).map(l => {

            const p = l.split(',');

            return {
                company: p[3] || p[0],
                address: p[4] || p[1],
                phone: p[2],
                route: path
            };
        });

        renderManifest(globalCustomers);

    } catch (e) {

        console.error("CSV Parse Error", e);
    }
}

function renderManifest(customers) {

    const stopList =
        document.getElementById('stopList');

    stopList.innerHTML = "";

    customers.forEach((c, idx) => {

        const card =
            document.createElement('div');

        card.className = 'delivery-card';

        card.innerHTML = `
            <div style="font-weight:bold;">
                ${c.company || 'Unknown'}
            </div>

            <div style="font-size:0.9rem; color:#4a5568;">
                ${c.address || ''}
            </div>

            <div style="font-size:0.85rem; color:#718096;">
                ${c.phone || ''}
            </div>
        `;

        card.onclick = () => openStopSlip(idx);

        stopList.appendChild(card);
    });
}

function openStopSlip(idx) {

    const c = globalCustomers[idx];

    if (!c) return;

    document.getElementById('activeAddress').innerText =
        `Address: ${c.address || '---'}`;

    document.getElementById('activePhone').innerText =
        `Phone: ${c.phone || '---'}`;

    alert(`Opening delivery slip for ${c.company}`);
}

function startRoute() {
    alert("Start Route");
}

function runEndOfDay() {
    alert("End of Day");
}

document.addEventListener('DOMContentLoaded', initApp);

</script>

</body>
</html>
