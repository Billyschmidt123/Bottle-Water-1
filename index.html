<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery - Grande Prairie</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #004a99; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        .side-panel { width: 380px; background: white; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .route-stop-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .route-stop-item:hover { background: #f0f7ff; }
        .active-stop { border-left-color: var(--primary); background: #eef6ff; }
        .btn-nav { padding: 8px 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 1100px; margin: 2% auto; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .info-bar { background: #fff; border: 1px solid #ced4da; padding: 8px; border-radius: 4px; font-size: 0.85rem; flex: 1; }
        .cart-box { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <h2 style="margin:0;">Culligan GP</h2>
        <select id="routeDropdown" style="padding:5px; border-radius:4px;"></select>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="optimizeCurrentRoute()" class="btn-nav" style="background:#6f42c1;"><i class="fas fa-magic"></i> Optimize</button>
        <button id="btnManager" class="btn-nav" style="background:#6c757d;">Manager</button>
    </div>
</header>

<div style="background:#e9ecef; padding:8px 20px; display:flex; gap:10px; align-items:center; border-bottom:1px solid #ccc;">
    <button id="btnStartRoute" class="btn-nav" style="background:var(--success);">START</button>
    <button id="btnFinishRoute" class="btn-nav" style="background:var(--danger);" onclick="managerEndOfDay()">EOD FINISH</button>
    <div id="navAddressBar" class="info-bar">Address: ---</div>
    <button class="btn-nav" style="background:#007bff;" onclick="openDirections()"><i class="fas fa-location-arrow"></i></button>
</div>

<div class="main-container">
    <div id="map"></div>
    <div class="side-panel">
        <div id="stopList" class="stop-list">
            <p style="text-align:center; color:#999; margin-top:20px;">Load a route to begin.</p>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between;">
            <h3 id="editTitle">Stop Details</h3>
            <button onclick="closeModal('editModal')" style="border:none; background:none; cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>
        <div class="form-grid">
            <div style="display:flex; flex-direction:column;"><label>Company</label><input type="text" id="edit_Company"></div>
            <div style="display:flex; flex-direction:column;"><label>Address</label><input type="text" id="edit_Address"></div>
            <div style="display:flex; flex-direction:column;"><label>Phone</label><input type="text" id="edit_Phone"></div>
            <div style="display:flex; flex-direction:column;"><label>Notes</label><input type="text" id="edit_Notes"></div>
            <div style="display:flex; flex-direction:column;"><label>Status</label>
                <select id="edit_Status">
                    <option value="Pending">Pending</option>
                    <option value="Completed">Completed</option>
                    <option value="Skipped">Skipped</option>
                </select>
            </div>
        </div>
        <div class="cart-box">
            <strong>Order Management:</strong>
            <div style="display:flex; gap:10px; margin:10px 0;">
                <select id="edit_WaterProduct" style="flex:2;"></select>
                <input type="number" id="edit_WaterQty" value="1" style="width:50px;">
                <button onclick="addItemToCart()" class="btn-nav" style="background:var(--primary);">Add</button>
            </div>
            <div id="edit_CartDisplay"></div>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="saveEdit()" class="btn-nav" style="background:var(--success); flex:1;">Save & Close</button>
            <button onclick="generateSlip()" class="btn-nav" style="background:#17a2b8;"><i class="fas fa-file-pdf"></i> PDF Slip</button>
            <button onclick="sendEmail()" class="btn-nav" style="background:#6c757d;"><i class="fas fa-envelope"></i> Email</button>
        </div>
    </div>
</div>

<div id="mgrModal" class="modal-overlay">
    <div class="modal-content" style="max-width:1200px;">
        <h3>Manager Control Panel</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-nav" style="background:var(--primary);" onclick="openNewCustomer()">+ New Customer</button>
            <button class="btn-nav" style="background:#6c757d;" onclick="downloadBackup()">Backup CSV</button>
        </div>
        <table style="width:100%; border-collapse: collapse;" id="mgmtTable">
            <thead style="background:#eee;">
                <tr><th>ID</th><th>Company</th><th>Address</th><th>Route</th><th>Action</th></tr>
            </thead>
            <tbody id="mgmtTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    // Auth & Config
    const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
    const token = _k.map(c => String.fromCharCode(c)).join('');
    const repo = 'Billyschmidt123/Bottle-Water-1';
    
    let globalCustomers = [];
    let availableRoutes = [];
    let currentEditIndex = null;
    let map, routeLine, markers = [];
    const warehouseCoord = [55.1708, -118.7947]; // Grande Prairie Warehouse

    // 1. Initialization
    async function init() {
        map = L.map('map').setView(warehouseCoord, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(warehouseCoord, {title: "Warehouse"}).addTo(map);
        
        await loadData();
        setupEventListeners();
    }

    async function loadData() {
        try {
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/routes`, {
                headers: {'Authorization': `token ${token}`}
            });
            const files = await r.json();
            availableRoutes = files.filter(f => f.name.endsWith('.csv')).map(f => f.name);
            
            const dropdown = document.getElementById('routeDropdown');
            dropdown.innerHTML = '<option value="">Select Route</option>' + 
                availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');

            globalCustomers = [];
            for(let f of files) {
                if(!f.name.endsWith('.csv')) continue;
                const txt = await (await fetch(f.download_url)).text();
                const lines = txt.split('\n').filter(l => l.trim());
                const headers = lines[0].split(',');
                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let obj = { "__route": f.name };
                    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || "").trim());
                    globalCustomers.push(obj);
                });
            }
        } catch(e) { console.error("Load failed", e); }
    }

    // 2. Mapping & Geocoding
    async function geocodeAddress(address) {
        try {
            const cleanAddr = address + ", Grande Prairie, AB";
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanAddr)}`);
            const data = await res.json();
            return data.length > 0 ? [parseFloat(data[0].lat), parseFloat(data[0].lon)] : null;
        } catch { return null; }
    }

    async function plotRoute(routeFile) {
        markers.forEach(m => map.removeLayer(m));
        if(routeLine) map.removeLayer(routeLine);
        markers = [];

        const stops = globalCustomers.filter(c => c.__route === routeFile);
        const latlngs = [warehouseCoord];

        for(let stop of stops) {
            const coord = await geocodeAddress(stop.Address);
            if(coord) {
                stop.__coord = coord;
                latlngs.push(coord);
                const m = L.marker(coord).addTo(map)
                    .bindTooltip(`<b>${stop.Company}</b><br>${stop.Address}`)
                    .on('click', () => openEdit(globalCustomers.indexOf(stop)));
                markers.push(m);
            }
        }
        
        latlngs.push(warehouseCoord);
        routeLine = L.polyline(latlngs, {color: '#004a99', weight: 3, opacity: 0.6}).addTo(map);
        map.fitBounds(routeLine.getBounds());
    }

    // 3. Route Optimization (Nearest Neighbor)
    window.optimizeCurrentRoute = async function() {
        const routeFile = document.getElementById('routeDropdown').value;
        if(!routeFile) return alert("Select a route first");

        let unvisited = globalCustomers.filter(c => c.__route === routeFile);
        let optimized = [];
        let currentPos = warehouseCoord;

        while(unvisited.length > 0) {
            let closestIdx = -1;
            let minDist = Infinity;

            for(let i=0; i < unvisited.length; i++) {
                if(!unvisited[i].__coord) unvisited[i].__coord = await geocodeAddress(unvisited[i].Address);
                if(!unvisited[i].__coord) continue;

                const d = L.latLng(currentPos).distanceTo(L.latLng(unvisited[i].__coord));
                if(d < minDist) { minDist = d; closestIdx = i; }
            }

            if(closestIdx === -1) break;
            const stop = unvisited.splice(closestIdx, 1)[0];
            optimized.push(stop);
            currentPos = stop.__coord;
        }
        
        // Re-inject optimized order into global list
        globalCustomers = globalCustomers.filter(c => c.__route !== routeFile).concat(optimized);
        renderStopList(routeFile);
        plotRoute(routeFile);
        alert("Route optimized for nearest neighbor distance.");
    };

    // 4. Delivery & EOD Logic
    window.managerEndOfDay = function() {
        const route = document.getElementById('routeDropdown').value;
        if(!route) return;
        
        const completed = globalCustomers.filter(c => c.__route === route && c.Status === 'Completed');
        if(confirm(`End of Day: Process ${completed.length} completed stops?`)) {
            // Logic to move to history or clear status
            globalCustomers.forEach(c => {
                if(c.__route === route) c.Status = 'Pending'; 
            });
            alert("Route reset. Daily logs compiled (Simulated).");
            renderStopList(route);
        }
    };

    // 5. PDF & Email
    window.generateSlip = function() {
        const record = globalCustomers[currentEditIndex];
        const element = `<div><h2>Culligan Delivery Slip</h2><p>Customer: ${record.Company}</p><p>Address: ${record.Address}</p></div>`;
        html2pdf().from(element).save(`${record.Company}_Slip.pdf`);
    };

    window.sendEmail = function() {
        const record = globalCustomers[currentEditIndex];
        const subject = encodeURIComponent(`Delivery Notification - ${record.Company}`);
        const body = encodeURIComponent(`Hello, your delivery has been processed for ${record.Address}.`);
        window.location.href = `mailto:${record.Email}?subject=${subject}&body=${body}`;
    };

    // UI Helpers
    function renderStopList(routeFile) {
        const list = document.getElementById('stopList');
        const stops = globalCustomers.filter(c => c.__route === routeFile);
        list.innerHTML = stops.map((s, i) => `
            <div class="route-stop-item ${s.Status === 'Completed' ? 'active-stop' : ''}" onclick="openEdit(${globalCustomers.indexOf(s)})">
                <strong>${i+1}. ${s.Company}</strong><br>
                <small>${s.Address}</small>
                <span style="float:right; font-size:0.7rem; color:#666;">${s.Status || 'Pending'}</span>
            </div>
        `).join('');
    }

    function openEdit(idx) {
        currentEditIndex = idx;
        const rec = globalCustomers[idx];
        document.getElementById('edit_Company').value = rec.Company || '';
        document.getElementById('edit_Address').value = rec.Address || '';
        document.getElementById('edit_Phone').value = rec.Phone || '';
        document.getElementById('edit_Status').value = rec.Status || 'Pending';
        document.getElementById('navAddressBar').innerText = "Address: " + rec.Address;
        document.getElementById('editModal').style.display = 'block';
    }

    window.saveEdit = function() {
        const rec = globalCustomers[currentEditIndex];
        rec.Company = document.getElementById('edit_Company').value;
        rec.Status = document.getElementById('edit_Status').value;
        document.getElementById('editModal').style.display = 'none';
        renderStopList(rec.__route);
    }

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    function setupEventListeners() {
        document.getElementById('routeDropdown').onchange = (e) => {
            if(e.target.value) {
                renderStopList(e.target.value);
                plotRoute(e.target.value);
            }
        };
        document.getElementById('btnManager').onclick = () => {
            document.getElementById('mgrModal').style.display = 'block';
        };
    }

    init();
})();
</script>
</body>
</html>
