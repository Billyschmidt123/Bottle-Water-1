<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Bottle Water Grande Prairie</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        header { background: #004a99; color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1100; }
        .nav-controls { background: #e9ecef; padding: 12px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #ccc; }
        .info-pill { background: white; border: 1px solid #cbd5e0; padding: 8px 15px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; color: #2d3748; flex-grow: 1; min-height: 20px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .main-view { display: flex; flex: 1; height: calc(100vh - 120px); }
        #map { flex: 7; height: 100%; border-right: 1px solid #ccc; z-index: 1; }
        .sidebar { flex: 3; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .stop-list-container { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .delivery-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; border-left: 5px solid #004a99; transition: 0.2s; }
        .delivery-card:hover { background: #f8fafc; }
        .btn-ui { padding: 10px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 1300px; height: 90vh; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .mgmt-table { width: 100%; border-collapse: collapse; background: white; }
        .mgmt-table th { background: #edf2f7; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e0; position: sticky; top: 0; }
        .mgmt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        #slipPreview { padding: 40px; background: white; color: black; min-height: 800px; }
        .culligan-slip { font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; max-width: 800px; margin: auto; background: #fff; }
        .c-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .c-table th, .c-table td { border: 1px solid #000; padding: 5px; font-size: 0.85rem; }
        .sig-canvas { border: 1px solid #000; background: #fafafa; width: 100%; height: 150px; cursor: crosshair; }
        .red-text { color: #d00; font-weight: bold; }
        .qty-input { width: 60px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; text-align: center; }
        .del-btn { color: #dc3545; cursor: pointer; margin-left: 10px; font-size: 1rem; }
        .maint-input { width: 90%; padding: 5px; border: 1px solid #ddd; }
        .deactivated { opacity: 0.5; background: #f9f9f9; }
        @media print { .no-print { display: none !important; } .only-print { display: inline !important; } }
        .only-print { display: none; }

        /* === ADDED: Customer Edit Modal Styling (minimal) === */
        .edit-field-row { margin-bottom: 10px; }
        .edit-field-row label { display:block; font-size:0.85rem; margin-bottom:3px; color:#4a5568; }
        .edit-field-row input { width:100%; padding:6px 8px; border:1px solid #cbd5e0; border-radius:4px; font-size:0.9rem; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="margin:0; font-size:1.6rem;"><i class="fas fa-truck-loading"></i> Culligan Bottle Water Grande Prairie</h1>
        <select id="routeDropdown" onchange="loadSelectedRoute()" style="background:#003366; color:white; border:1px solid #0056b3; padding:8px; border-radius:4px; font-weight:bold;"></select>
    </div>
    <div style="display:flex; gap:12px;">
        <button class="btn-ui" style="background:#6c757d;" onclick="openModal('mgrModal')"><i class="fas fa-user-shield"></i> Manager Portal</button>
        <button class="btn-ui" style="background:#17a2b8;" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
</header>

<div class="nav-controls">
    <button class="btn-ui" style="background: #28a745;" onclick="startRoute()"><i class="fas fa-play"></i> START ROUTE</button>
    <button class="btn-ui" style="background: #dc3545;" onclick="runEndOfDay()"><i class="fas fa-flag-checkered"></i> FINISH</button>
    <div id="activeAddress" class="info-pill">Address: ---</div>
    <div id="activePhone" class="info-pill" style="flex-grow: 0; min-width: 180px;">Phone: ---</div>
</div>

<div class="main-view">
    <div id="map"></div>
    <div class="sidebar">
        <div id="stopList" class="stop-list-container">
            <div style="text-align:center; padding-top:40px; color:#a0aec0;">Select a route to view stops.</div>
        </div>
    </div>
</div>

<!-- Modal Definitions -->
<div id="mgrModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#004a99; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3>Management Hub</h3>
            <button onclick="closeModal('mgrModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:20px;">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-ui" style="background:#007bff;" onclick="openProductMaintenance()"><i class="fas fa-boxes"></i> Product Maintenance</button>
                <button class="btn-ui" style="background:#28a745;" onclick="openCustomerMaintenance()"><i class="fas fa-users"></i> Customer Maintenance</button>
            </div>
            <table class="mgmt-table">
                <thead><tr><th>Route Name</th><th>Path</th></tr></thead>
                <tbody id="mgrTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="stopModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#28a745; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3>Delivery Slip</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="emailSlip()" class="btn-ui" style="background:#fff; color:#28a745;">Save PDF</button>
                <button onclick="closeModal('stopModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div id="slipPreview"></div>
    </div>
</div>

<div id="productMaintModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#343a40; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3>Product Maintenance</h3>
            <button onclick="closeModal('productMaintModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:20px; overflow-y:auto;">
            <table class="mgmt-table">
                <thead><tr><th>Name</th><th>Size</th><th>Base Price</th><th>Action</th></tr></thead>
                <tbody id="productMaintBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ADDED: Customer Maintenance Modal -->
<div id="customerMaintModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#155724; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3><i class="fas fa-user-edit"></i> Customer Maintenance</h3>
            <button onclick="closeModal('customerMaintModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;">
            <div style="margin-bottom:15px; display:flex; gap:10px;">
                <input type="text" id="custSearch" placeholder="Search customer name or address..." style="flex:1; padding:10px; border:1px solid #ccc; border-radius:5px;">
                <button class="btn-ui" style="background:#28a745;" onclick="addNewCustomerRow()"><i class="fas fa-user-plus"></i> New Customer</button>
            </div>
            <table class="mgmt-table">
                <thead>
                    <tr>
                        <th>Company/Name</th>
                        <th>Address</th>
                        <th>Phone</th>
                        <th>Route Assoc.</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerMaintBody"></tbody>
            </table>
        </div>
        <div style="padding:15px; background:#f8fafc; border-top:1px solid #eee; text-align:right;">
            <button class="btn-ui" style="background:#007bff;" onclick="saveCustomerDatabase()"><i class="fas fa-save"></i> Commit Changes</button>
        </div>
    </div>
</div>

<!-- === ADDED: Customer Edit Modal === -->
<div id="customerEditModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#1f2933; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3><i class="fas fa-user-cog"></i> Edit Customer</h3>
            <button onclick="closeModal('customerEditModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;" id="customerEditForm"></div>
        <div style="padding:15px; background:#f8fafc; border-top:1px solid #eee; text-align:right;">
            <button class="btn-ui" style="background:#28a745;" onclick="saveCustomerEditModal()"><i class="fas fa-check"></i> Save</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, markers = [];
    const warehouseCoord = [55.1707, -118.7947];
    const REPO_OWNER = "Billyschmidt123";
    const REPO_NAME = "Bottle-Water-1";
    const REPO_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    
    let globalProducts = [];
    let currentStopProducts = [];
    let globalCustomers = []; // ADDED: Global store for customer data

    // === ADDED: Customer Maintenance Data Stores ===
    let customerMaintList = [];
    let currentEditCustomerIndex = null;

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function initApp() {
        map = L.map('map').setView(warehouseCoord, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(warehouseCoord).addTo(map).bindPopup("Warehouse").openPopup();
        await loadDynamicRoutes();
        await loadProductList();
    }

    async function loadProductList() {
        const productFiles = ["Products/Water.csv", "Products/Coffee.csv"];
        try {
            for (const path of productFiles) {
                const res = await fetch(`${REPO_BASE}/${path}`);
                const json = await res.json();
                const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
                const lines = decoded.split(/\n/).filter(l => l.trim() !== '');
                lines.slice(1).forEach(line => {
                    const p = line.split(',');
                    globalProducts.push({ name: p[0], size: p[1], price: parseFloat(p[2]) || 0, source: path, active: true });
                });
            }
        } catch (e) { console.error("Product Load Error", e); }
    }

    async function loadDynamicRoutes() {
        const dropdown = document.getElementById('routeDropdown');
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const contents = await res.json();
            const files = contents.filter(f => f.name.endsWith('.csv'));
            dropdown.innerHTML = '<option value="">-- Select Route --</option>' + 
                files.map(f => `<option value="${f.path}">${f.name.replace('.csv', '')}</option>`).join('');
        } catch (e) { console.error("Route Load Error", e); }
    }

    async function loadSelectedRoute() {
        const path = document.getElementById('routeDropdown').value;
        if (!path) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        try {
            const res = await fetch(`${REPO_BASE}/${path}`);
            const json = await res.json();
            const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
            const lines = decoded.split(/\n/).filter(l => l.trim() !== '');
            
            // ADDED: Populate globalCustomers from the currently loaded route
            globalCustomers = lines.slice(1).map(l => {
                const p = l.split(',');
                return { company: p[3] || p[0], address: p[4] || p[1], phone: p[2], route: path };
            });

            renderManifest(globalCustomers);
        } catch (e) { console.error("CSV Parse Error", e); }
    }

    function renderManifest(stops) {
        const container = document.getElementById('stopList');
        container.innerHTML = "";
        stops.forEach((stop, i) => {
            const card = document.createElement('div');
            card.className = 'delivery-card';
            card.innerHTML = `<strong>${i+1}. ${stop.company}</strong><br><small>${stop.address}</small>`;
            card.onclick = () => {
                document.getElementById('activeAddress').innerText = stop.address;
                document.getElementById('activePhone').innerText = stop.phone;
                window.currentActiveStop = stop;
                openStopSlip(stop);
            };
            container.appendChild(card);
        });
    }

    function openStopSlip(stop) {
        const preview = document.getElementById('slipPreview');
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        preview.innerHTML = `
            <div class="culligan-slip">
                <h2>Culligan</h2>
                <p><strong>DATE:</strong> ${dateStr}</p>
                <p><strong>CUSTOMER:</strong> ${stop.company}<br>${stop.address}</p>
                <table class="c-table">
                    <thead><tr><th>QTY</th><th>DESCRIPTION</th><th>PRICE</th></tr></thead>
                    <tbody><tr><td colspan="3">Select products in management to populate.</td></tr></tbody>
                </table>
            </div>`;
        openModal('stopModal');
    }

    function emailSlip() {
        const stop = window.currentActiveStop;
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const fileName = `${stop.company} - 100131 - ${dateStr}.pdf`;
        html2pdf().from(document.getElementById('slipPreview')).save(fileName);
    }

    function emailSlip() {
        const stop = window.currentActiveStop;
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const fileName = `${stop.company} - 100131 - ${dateStr}.pdf`;
        html2pdf().from(document.getElementById('slipPreview')).save(fileName);
    }

    function openProductMaintenance() {
        const body = document.getElementById('productMaintBody');
        body.innerHTML = globalProducts.map(p => `
            <tr><td>${p.name}</td><td>${p.size}</td><td>$${p.price.toFixed(2)}</td><td>Active</td></tr>
        `).join('');
        openModal('productMaintModal');
    }

    // ADDED: Customer Maintenance Functions
    function openCustomerMaintenance() {
        renderCustomerTable();
        openModal('customerMaintModal');
    }

    function renderCustomerTable() {
        const body = document.getElementById('customerMaintBody');
        body.innerHTML = "";
        globalCustomers.forEach((c, idx) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="maint-input" value="${c.company}" onchange="updateCustomerField(${idx}, 'company', this.value)"></td>
                <td><input type="text" class="maint-input" value="${c.address}" onchange="updateCustomerField(${idx}, 'address', this.value)"></td>
                <td><input type="text" class="maint-input" value="${c.phone}" onchange="updateCustomerField(${idx}, 'phone', this.value)"></td>
                <td><small>${c.route}</small></td>
                <td><button class="btn-ui" style="background:#dc3545; padding:5px 10px;" onclick="removeCustomer(${idx})"><i class="fas fa-trash"></i></button></td>
            `;
            body.appendChild(row);
        });
    }

    function updateCustomerField(idx, field, value) {
        globalCustomers[idx][field] = value;
    }

    function removeCustomer(idx) {
        if(confirm("Remove this customer from the temporary list?")) {
            globalCustomers.splice(idx, 1);
            renderCustomerTable();
        }
    }

    function addNewCustomerRow() {
        globalCustomers.unshift({ company: "New Customer", address: "Pending", phone: "000-000-0000", route: "Manual Entry" });
        renderCustomerTable();
    }

    function saveCustomerDatabase() {
        alert("Customer data updated locally. Synchronize via GitHub API for permanent storage.");
        renderManifest(globalCustomers);
        closeModal('customerMaintModal');
    }

    function startRoute() { alert("GPS Logging Active"); }
    function runEndOfDay() { if(confirm("End day?")) location.reload(); }

    // === ADDED: Enhanced Customer Maintenance Using Routes CSV (NON-DESTRUCTIVE OVERRIDES) ===

    // Helper: decode GitHub content
    async function fetchAndDecodeFile(path) {
        const res = await fetch(`${REPO_BASE}/${path}`);
        const json = await res.json();
        const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
        return { decoded, sha: json.sha };
    }

    // Load ALL customers from ALL route CSVs into customerMaintList
    async function loadAllRouteCustomersForMaintenance() {
        customerMaintList = [];
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const contents = await res.json();
            const files = contents.filter(f => f.name.endsWith('.csv'));
            for (const file of files) {
                const { decoded } = await fetchAndDecodeFile(file.path);
                const lines = decoded.split(/\n/).filter(l => l.trim() !== '');
                if (lines.length < 2) continue;
                const headers = lines[0].split(',');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.every(v => v.trim() === "")) continue;
                    const obj = {};
                    headers.forEach((h, idx) => {
                        obj[h.trim()] = cols[idx] !== undefined ? cols[idx] : "";
                    });
                    obj.__routePath = file.path;
                    obj.__rowIndex = i;
                    obj.__deleted = false;
                    obj.__new = false;
                    customerMaintList.push(obj);
                }
            }
        } catch (e) {
            console.error("Customer Maintenance Load Error", e);
        }
    }

    // OVERRIDE: openCustomerMaintenance to load from all route CSVs
    function openCustomerMaintenance() {
        loadAllRouteCustomersForMaintenance().then(() => {
            renderCustomerTable();
            openModal('customerMaintModal');
        });
    }

    // OVERRIDE: renderCustomerTable to use customerMaintList and add Edit button
    function renderCustomerTable() {
        const body = document.getElementById('customerMaintBody');
        const search = (document.getElementById('custSearch') || {}).value || "";
        body.innerHTML = "";
        customerMaintList
            .map((c, idx) => ({ c, idx }))
            .filter(({ c }) => !c.__deleted)
            .filter(({ c }) => {
                if (!search.trim()) return true;
                const s = search.toLowerCase();
                const name = (c.Company || c.company || "").toLowerCase();
                const addr = (c.Address || c.address || "").toLowerCase();
                return name.includes(s) || addr.includes(s);
            })
            .forEach(({ c, idx }) => {
                const row = document.createElement('tr');
                const company = c.Company || c.company || c["Customer"] || "";
                const address = c.Address || c.address || c["Address"] || "";
                const phone = c.Phone || c.phone || c["Phone"] || "";
                const route = c.__routePath || c.route || "";
                row.innerHTML = `
                    <td><input type="text" class="maint-input" value="${company}" onchange="updateCustomerField(${idx}, 'company', this.value)"></td>
                    <td><input type="text" class="maint-input" value="${address}" onchange="updateCustomerField(${idx}, 'address', this.value)"></td>
                    <td><input type="text" class="maint-input" value="${phone}" onchange="updateCustomerField(${idx}, 'phone', this.value)"></td>
                    <td><small>${route}</small></td>
                    <td style="display:flex; gap:6px;">
                        <button class="btn-ui" style="background:#6c757d; padding:5px 10px;" onclick="openCustomerEditModal(${idx})"><i class="fas fa-pen"></i></button>
                        <button class="btn-ui" style="background:#dc3545; padding:5px 10px;" onclick="removeCustomer(${idx})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                body.appendChild(row);
            });
    }

    // OVERRIDE: updateCustomerField to map logical fields to header keys
    function updateCustomerField(idx, field, value) {
        const c = customerMaintList[idx];
        if (!c) return;
        if (field === 'company') {
            if ('Company' in c) c.Company = value;
            else if ('company' in c) c.company = value;
            else c.Company = value;
        } else if (field === 'address') {
            if ('Address' in c) c.Address = value;
            else if ('address' in c) c.address = value;
            else c.Address = value;
        } else if (field === 'phone') {
            if ('Phone' in c) c.Phone = value;
            else if ('phone' in c) c.phone = value;
            else c.Phone = value;
        } else {
            c[field] = value;
        }
    }

    // OVERRIDE: removeCustomer to mark as deleted
    function removeCustomer(idx) {
        if (confirm("Remove this customer from the list?")) {
            if (customerMaintList[idx]) {
                customerMaintList[idx].__deleted = true;
            }
            renderCustomerTable();
        }
    }

    // OVERRIDE: addNewCustomerRow to create a new record
    function addNewCustomerRow() {
        const obj = {
            Company: "New Customer",
            Address: "Pending",
            Phone: "000-000-0000",
            __routePath: "routes/manual-entry.csv",
            __rowIndex: -1,
            __deleted: false,
            __new: true
        };
        customerMaintList.unshift(obj);
        renderCustomerTable();
    }

    // === ADDED: Customer Edit Modal Logic ===
    function openCustomerEditModal(idx) {
        currentEditCustomerIndex = idx;
        const cust = customerMaintList[idx];
        if (!cust) return;
        const container = document.getElementById('customerEditForm');
        container.innerHTML = "";
        Object.keys(cust)
            .filter(k => !k.startsWith('__'))
            .forEach(key => {
                const row = document.createElement('div');
                row.className = 'edit-field-row';
                const safeVal = (cust[key] ?? "").toString().replace(/"/g, '&quot;');
                row.innerHTML = `
                    <label>${key}</label>
                    <input type="text" data-field="${key}" value="${safeVal}">
                `;
                container.appendChild(row);
            });
    }

    function saveCustomerEditModal() {
        if (currentEditCustomerIndex === null) return;
        const cust = customerMaintList[currentEditCustomerIndex];
        if (!cust) return;
        const inputs = document.querySelectorAll('#customerEditForm input[data-field]');
        inputs.forEach(inp => {
            const field = inp.getAttribute('data-field');
            cust[field] = inp.value;
        });
        currentEditCustomerIndex = null;
        closeModal('customerEditModal');
        renderCustomerTable();
    }

    // === ADDED: Save Back to Route CSV Files via GitHub API ===
    // NOTE: Requires a GitHub token exposed as window.GITHUB_TOKEN at runtime.
    async function updateRouteFile(path, newContent, sha) {
        if (!window.GITHUB_TOKEN) {
            console.warn("GITHUB_TOKEN not set. Generated CSV for", path, ":\n", newContent);
            return;
        }
        const body = {
            message: `Update customers for ${path}`,
            content: btoa(unescape(encodeURIComponent(newContent))),
            sha: sha
        };
        await fetch(`${REPO_BASE}/${path}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${window.GITHUB_TOKEN}`
            },
            body: JSON.stringify(body)
        });
    }

    // OVERRIDE: saveCustomerDatabase to persist changes back to CSV files
    async function saveCustomerDatabase() {
        try {
            // Group by route path
            const byRoute = {};
            customerMaintList.forEach(c => {
                if (!c.__routePath) return;
                if (!byRoute[c.__routePath]) byRoute[c.__routePath] = [];
                if (!c.__deleted) byRoute[c.__routePath].push(c);
            });

            for (const routePath of Object.keys(byRoute)) {
                const { decoded, sha } = await fetchAndDecodeFile(routePath);
                const lines = decoded.split(/\n/).filter(l => l.trim() !== '');
                if (lines.length === 0) continue;
                const headerLine = lines[0];
                const headers = headerLine.split(',').map(h => h.trim());
                const rows = byRoute[routePath].map(c => {
                    return headers.map(h => {
                        const v = c[h] !== undefined ? c[h] : "";
                        return (v ?? "").toString().replace(/,/g, ' ');
                    }).join(',');
                });
                const newContent = [headerLine].concat(rows).join('\n');
                await updateRouteFile(routePath, newContent, sha);
            }

            alert("Customer data committed. Route CSV files updated (or CSV logged if no token).");
        } catch (e) {
            console.error("Customer Save Error", e);
            alert("Error saving customer data. Check console for details.");
        }
        renderCustomerTable();
        closeModal('customerMaintModal');
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
