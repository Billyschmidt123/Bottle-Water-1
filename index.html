<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Delivery System - Full Build</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        header { background: #004a99; color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1100; }
        .nav-controls { background: #e9ecef; padding: 12px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #ccc; }
        .info-pill { background: white; border: 1px solid #cbd5e0; padding: 8px 15px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; color: #2d3748; flex-grow: 1; min-height: 20px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .main-view { display: flex; flex: 1; height: calc(100vh - 120px); }
        #map { flex: 7; height: 100%; border-right: 1px solid #ccc; z-index: 1; }
        .sidebar { flex: 3; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .stop-list-container { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .delivery-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; border-left: 5px solid #004a99; transition: 0.2s; }
        .delivery-card:hover { background: #f8fafc; transform: translateX(3px); }
        .btn-ui { padding: 10px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 1300px; height: 90vh; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .mgmt-table { width: 100%; border-collapse: collapse; }
        .mgmt-table th { background: #edf2f7; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e0; position: sticky; top: 0; }
        .mgmt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .maint-input { width: 95%; padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; }
        .search-container { position: relative; width: 450px; }
        .maint-search { width: 100%; padding: 10px 15px; border-radius: 5px; border: 2px solid #004a99; font-size: 1rem; outline: none; }
        .search-dropdown { position: absolute; top: 45px; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 3000; display: none; max-height: 350px; overflow-y: auto; color: #333; }
        .search-row { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .search-row:hover { background: #f0f7ff; }
        .c-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid #000; }
        .c-table th, .c-table td { border: 1px solid #000; padding: 8px; font-size: 0.9rem; }
        .sig-canvas { border: 1px solid #000; background: #fafafa; width: 100%; height: 120px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="margin:0; font-size:1.5rem;"><i class="fas fa-tint"></i> Culligan Delivery</h1>
        <select id="routeDropdown" onchange="loadSelectedRoute()" style="background:#003366; color:white; border:1px solid #0056b3; padding:8px; border-radius:4px; font-weight:bold;"></select>
    </div>
    <div style="display:flex; gap:12px;">
        <button class="btn-ui" style="background:#6c757d;" onclick="openModal('mgrModal')"><i class="fas fa-user-shield"></i> Manager Portal</button>
        <button class="btn-ui" style="background:#17a2b8;" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Sync Data</button>
    </div>
</header>

<div class="nav-controls">
    <button class="btn-ui" style="background: #28a745;" onclick="startGPS()"><i class="fas fa-play"></i> START</button>
    <button class="btn-ui" style="background: #dc3545;" onclick="runEndOfDay()"><i class="fas fa-flag-checkered"></i> FINISH</button>
    <div id="activeAddress" class="info-pill">Address: ---</div>
    <div id="activePhone" class="info-pill" style="flex-grow: 0; min-width: 180px;">Phone: ---</div>
    <button class="btn-ui" style="background: #6f42c1;" onclick="optimizeRoute()"><i class="fas fa-magic"></i> OPTIMIZE</button>
</div>

<div class="main-view">
    <div id="map"></div>
    <div class="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee; background:#f8fafc;">
            <h3 style="margin:0;">Route Manifest</h3>
        </div>
        <div id="stopList" class="stop-list-container">
            <div style="text-align:center; padding-top:40px; color:#a0aec0;">Load a route to view stops.</div>
        </div>
    </div>
</div>

<!-- Manager Hub -->
<div id="mgrModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 650px; height: auto;">
        <div style="background:#004a99; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-tasks"></i> Management Hub</h3>
            <button onclick="closeModal('mgrModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-ui" style="background:#007bff; justify-content: center; padding: 15px;" onclick="openCustomerMaintenance()"><i class="fas fa-users-cog"></i> Customer Maintenance</button>
            <button class="btn-ui" style="background:#6610f2; justify-content: center; padding: 15px;" onclick="openProductMaintenance()"><i class="fas fa-boxes"></i> Product Maintenance</button>
            <button class="btn-ui" style="background:#e67e22; justify-content: center; padding: 15px;" onclick="exportMasterList()"><i class="fas fa-file-export"></i> Export Master List</button>
            <button class="btn-ui" style="background:#28a745; justify-content: center; padding: 15px;" onclick="alert('Call-In Mode')"><i class="fas fa-phone-alt"></i> Call-In Order</button>
            <button class="btn-ui" style="background:#444; justify-content: center; padding: 15px;" onclick="downloadBackup()"><i class="fas fa-database"></i> Backup Data</button>
            <button class="btn-ui" style="background:#f39c12; justify-content: center; padding: 15px;" onclick="runEndOfDay()"><i class="fas fa-calendar-check"></i> End of Day</button>
        </div>
    </div>
</div>

<!-- Customer Maintenance Modal -->
<div id="custMaintModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#007bff; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:25px;">
                <h3 style="margin:0;"><i class="fas fa-address-book"></i> Customer Maintenance</h3>
                <div class="search-container">
                    <input type="text" id="maintSearch" class="maint-search" placeholder="Search All Routes (Name or Address)..." onkeyup="searchAllFiles(this.value)">
                    <div id="maintSearchResults" class="search-dropdown"></div>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="saveAllCustomers()" class="btn-ui" style="background:#28a745;"><i class="fas fa-save"></i> Save Changes</button>
                <button onclick="closeModal('custMaintModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;">
            <table class="mgmt-table">
                <thead>
                    <tr>
                        <th style="width:100px;">Account #</th>
                        <th>Name / Company</th>
                        <th>Address</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="custMaintBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Product Maintenance Modal -->
<div id="prodMaintModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#6610f2; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-boxes"></i> Product Maintenance</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="addNewProductRow()" class="btn-ui" style="background:#28a745;"><i class="fas fa-plus"></i> Add New</button>
                <button onclick="saveAllProducts()" class="btn-ui" style="background:#007bff;"><i class="fas fa-save"></i> Save Products</button>
                <button onclick="closeModal('prodMaintModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;">
            <table class="mgmt-table">
                <thead>
                    <tr>
                        <th>Source File</th>
                        <th>Description</th>
                        <th>Size</th>
                        <th>Base Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="prodMaintBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Delivery Slip Modal -->
<div id="stopModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#28a745; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-file-invoice"></i> Delivery Slip</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="clearSignature()" class="btn-ui" style="background:#ffc107; color:#212529;"><i class="fas fa-eraser"></i> Clear Sig</button>
                <button onclick="savePDF()" class="btn-ui" style="background:#dc3545;"><i class="fas fa-file-pdf"></i> Save PDF</button>
                <button onclick="closeModal('stopModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div id="slipContent" style="padding:20px; flex:1; overflow-y:auto; background:#f0f2f5;">
            <div id="slipPreview"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, markers = [];
    const warehouseCoord = [55.1707, -118.7947];
    const REPO_OWNER = "Billyschmidt123";
    const REPO_NAME = "Bottle-Water-1";
    const REPO_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    
    let allCustomersCache = []; 
    let currentRouteStops = [];
    let globalProducts = [];
    let activeCustomer = null;
    let sigCanvas, sigCtx, drawing = false;

    async function initApp() {
        map = L.map('map').setView(warehouseCoord, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(warehouseCoord).addTo(map).bindPopup("Warehouse");
        await loadDynamicRoutes();
        await loadProductList();
        await preCacheAllRoutes(); 
    }

    async function loadProductList() {
        const productFiles = ["Products/Water.csv", "Products/Coffee.csv"];
        globalProducts = [];
        for (const path of productFiles) {
            try {
                const res = await fetch(`${REPO_BASE}/${path}`);
                const json = await res.json();
                const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
                const lines = decoded.split(/
?
/).filter(l => l.trim() !== '');
                if (lines.length < 2) continue;

                lines.slice(1).forEach(line => {
                    const p = line.split(',');
                    if(p[0]) {
                        globalProducts.push({ 
                            name: p[0].trim(), 
                            size: p[1]?.trim() || '', 
                            price: parseFloat(p[2]) || 0,
                            source: path,
                            active: true
                        });
                    }
                });
            } catch (e) { console.warn("Load failed:", path); }
        }
        window.globalActiveOptions = globalProducts.map((p, i) => `<option value="${i}">${p.name} (${p.size})</option>`).join('');
    }

    async function loadDynamicRoutes() {
        const dropdown = document.getElementById('routeDropdown');
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const files = await res.json();
            let options = files.filter(f => f.name.endsWith('.csv'))
                               .map(f => `<option value="${f.path}">${f.name.replace('.csv','')}</option>`);
            dropdown.innerHTML = '<option value="">-- Select Route --</option>' + options.join('');
        } catch (e) { console.error("Routes failed"); }
    }

    async function preCacheAllRoutes() {
        try {
            const res = await fetch(`${REPO_BASE}/routes`);
            const files = await res.json();
            allCustomersCache = [];
            for (let file of files) {
                if (!file.name.endsWith('.csv')) continue;
                const contentRes = await fetch(file.download_url);
                const text = await contentRes.text();
                const lines = text.split('
').slice(1);
                lines.forEach(line => {
                    const p = line.split(',');
                    if (p[0] && p[0].trim() !== '') {
                        allCustomersCache.push({
                            id: p[0].trim(),
                            name: p[3]?.trim() || p[0].trim(),
                            address: [p[4], p[5], p[6]].filter(Boolean).join(' '),
                            phone: p[2] || '---',
                            routeFile: file.path,
                            routeName: file.name.replace('.csv','')
                        });
                    }
                });
            }
        } catch (e) { console.warn("Cache fail"); }
    }

    function searchAllFiles(query) {
        const resultsBox = document.getElementById('maintSearchResults');
        if (query.length < 2) { resultsBox.style.display = 'none'; return; }
        const filtered = allCustomersCache.filter(c => c.name.toLowerCase().includes(query.toLowerCase()) || c.address.toLowerCase().includes(query.toLowerCase())).slice(0, 15);
        if (filtered.length > 0) {
            resultsBox.innerHTML = filtered.map(c => `<div class="search-row" onclick="selectFromSearch('${c.routeFile}', '${c.id}')"><strong>${c.name}</strong><br><small>${c.address} (${c.routeName})</small></div>`).join('');
            resultsBox.style.display = 'block';
        } else {
            resultsBox.innerHTML = '<div style="padding:10px;">No results.</div>';
            resultsBox.style.display = 'block';
        }
    }

    async function selectFromSearch(filePath, customerId) {
        document.getElementById('maintSearchResults').style.display = 'none';
        document.getElementById('maintSearch').value = "";
        document.getElementById('routeDropdown').value = filePath;
        await loadSelectedRoute();
        openCustomerMaintenance(); 
    }

    async function loadSelectedRoute() {
        const path = document.getElementById('routeDropdown').value;
        if (!path) return;
        try {
            const res = await fetch(`${REPO_BASE}/${path}`);
            const json = await res.json();
            const text = atob(json.content);
            const lines = text.split('
').filter(l => l.trim() !== '').slice(1);
            currentRouteStops = lines.map(line => {
                const p = line.split(',');
                return { id: p[0].trim(), company: p[3]?.trim() || 'Customer', address: [p[4], p[5], p[6]].filter(Boolean).join(' '), phone: p[2] || '---' };
            });
            renderManifest();
        } catch (e) { console.error("Load route fail"); }
    }

    function renderManifest() {
        const list = document.getElementById('stopList');
        list.innerHTML = currentRouteStops.map((stop, i) => `<div class="delivery-card" onclick="openStopSlip(currentRouteStops[${i}])"><strong>${i+1}. ${stop.company}</strong><br><small>${stop.address}</small></div>`).join('');
    }

    function openCustomerMaintenance() {
        const body = document.getElementById('custMaintBody');
        body.innerHTML = currentRouteStops.length ? currentRouteStops.map((s, i) => `<tr><td><input class="maint-input" value="${s.id}" onchange="currentRouteStops[${i}].id=this.value"></td><td><input class="maint-input" value="${s.company}" onchange="currentRouteStops[${i}].company=this.value"></td><td><input class="maint-input" value="${s.address}" onchange="currentRouteStops[${i}].address=this.value"></td><td><input class="maint-input" value="${s.phone}" onchange="currentRouteStops[${i}].phone=this.value"></td><td><button onclick="currentRouteStops.splice(${i},1); openCustomerMaintenance();" style="color:red;border:none;background:none;"><i class="fas fa-trash"></i></button></td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;padding:30px;">Load route to edit.</td></tr>';
        openModal('custMaintModal');
    }

    function openProductMaintenance() {
        const body = document.getElementById('prodMaintBody');
        body.innerHTML = globalProducts.map((p, i) => `<tr><td><select class="maint-input"><option ${p.source.includes('Water') ? 'selected':''}>Water</option><option ${p.source.includes('Coffee') ? 'selected':''}>Coffee</option></select></td><td><input class="maint-input" value="${p.name}"></td><td><input class="maint-input" value="${p.size}"></td><td><input class="maint-input" value="${p.price}"></td><td><button style="color:red;border:none;background:none;"><i class="fas fa-trash"></i></button></td></tr>`).join('');
        openModal('prodMaintModal');
    }

    function openStopSlip(stop) {
        activeCustomer = stop;
        document.getElementById('activeAddress').innerText = stop.address;
        document.getElementById('activePhone').innerText = stop.phone;
        const preview = document.getElementById('slipPreview');
        preview.innerHTML = `<div id="pdfContent" style="background:white; padding:40px; border:1px solid #ccc; max-width:850px; margin:auto; color:#000;"><div style="display:flex; justify-content:space-between;"><div><h1 style="color:#004a99; margin:0;">Culligan Water</h1><p>12001 99 Ave, Grande Prairie, AB</p></div><div style="text-align:right;"><h3>Delivery Slip</h3><p>Date: ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p></div></div><hr><div style="margin:20px 0;"><strong>BILL TO:</strong><br>${stop.company}<br>${stop.address}</div><div class="no-print" style="margin-bottom:10px;"><select style="width:100%; padding:8px; border:2px solid #004a99; border-radius:4px;"><option>+ Add Product</option>${window.globalActiveOptions}</select></div><table class="c-table" style="width:100%;"><thead><tr style="background:#eee;"><th>QTY</th><th>ITEM DESCRIPTION</th><th>UNIT</th><th>TOTAL</th></tr></thead><tbody><tr style="height:150px;"><td colspan="4" style="text-align:center;">Add products to begin slip...</td></tr></tbody></table><div style="margin-top:30px;"><p>Signature:</p><canvas id="signaturePad" class="sig-canvas"></canvas></div></div>`;
        openModal('stopModal');
        initSignaturePad();
    }

    function initSignaturePad() {
        sigCanvas = document.getElementById('signaturePad');
        if (!sigCanvas) return;
        sigCtx = sigCanvas.getContext('2d');
        sigCanvas.width = sigCanvas.offsetWidth;
        sigCanvas.height = 120;
        sigCanvas.onmousedown = () => { drawing = true; sigCtx.beginPath(); };
        sigCanvas.onmouseup = () => drawing = false;
        sigCanvas.onmousemove = (e) => { if(!drawing) return; const rect = sigCanvas.getBoundingClientRect(); sigCtx.lineTo(e.clientX - rect.left, e.clientY - rect.top); sigCtx.stroke(); };
    }

    function clearSignature() { if(sigCtx) sigCtx.clearRect(0,0,sigCanvas.width, sigCanvas.height); }
    function savePDF() { const longDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); const filename = `${activeCustomer.company} - ${activeCustomer.id} - ${longDate}.pdf`; html2pdf().from(document.getElementById('pdfContent')).save(filename); }
    function startGPS() { alert("GPS Logging Active"); }
    function optimizeRoute() { alert("Optimizing Route Path"); }
    function exportMasterList() { alert("Exporting Master CSV..."); }
    function downloadBackup() { alert("Downloading SQLite Backup..."); }
    function runEndOfDay() { alert("Finalizing Daily Routes..."); }
    function saveAllCustomers() { renderManifest(); alert("Route saved."); closeModal('custMaintModal'); }
    function saveAllProducts() { alert("Products updated."); closeModal('prodMaintModal'); }
    function addNewProductRow() { globalProducts.push({name:'New Item', size:'', price:0, source:'Water'}); openProductMaintenance(); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
