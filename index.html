<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        header { background: #004a99; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        .main-container { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
        #map { flex: 1; background: #e5e3df; }
        .side-panel { width: 350px; background: white; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .controls { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; display: flex; gap: 5px; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; flex: 1; }
        .btn-mgr { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>

<body>

<header>
    <h1 style="margin:0; font-size: 20px;">LogiFlow Delivery</h1>
    <button class="btn-mgr" onclick="toggleManagerPanel()"><i class="fas fa-tasks"></i> Manager</button>
</header>

<div class="main-container">
    <div id="map"></div>
    <div class="side-panel">
        <div class="controls">
            <select id="routeSelect" onchange="loadSpecificRoute()">
                <option value="">Select Route...</option>
            </select>
        </div>
        <div id="managerPanel" style="display:none; padding:10px; background:#f9f9f9; border-bottom:1px solid #ccc;">
            <input type="text" id="mgrSearch" placeholder="Search all routes..." onkeyup="searchAllRoutes()">
        </div>
        <div id="stopList" class="stop-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
(function () {
    const repo = 'Billyschmidt123/Bottle-Water-1';
    const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
    const token = _k.map(c => String.fromCharCode(c)).join('');

    let map, markerGroup;
    let allRouteFiles = [];
    let currentData = [];

    function initMap() {
        map = L.map('map').setView([55.1708, -118.7947], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        markerGroup = L.layerGroup().addTo(map);
    }

    async function fetchRouteList() {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/routes`, {
                headers: { Authorization: `token ${token}` }
            });
            allRouteFiles = await res.json();
            const select = document.getElementById("routeSelect");
            allRouteFiles.forEach(f => {
                if(f.name.endsWith('.csv')) {
                    let opt = document.createElement("option");
                    opt.value = f.download_url;
                    opt.text = f.name.replace('.csv', '');
                    select.add(opt);
                }
            });
        } catch (e) { console.error("Error fetching routes", e); }
    }

    window.loadSpecificRoute = async function() {
        const url = document.getElementById("routeSelect").value;
        if(!url) return;
        const txt = await (await fetch(url)).text();
        processCSV(txt);
    };

    function processCSV(txt) {
        const lines = txt.split('\n').filter(l => l.trim());
        const headers = lines[0].split(',').map(h => h.trim());
        currentData = lines.slice(1).map(line => {
            const vals = line.split(',');
            let obj = {};
            headers.forEach((h, i) => obj[h] = vals[i] ? vals[i].trim() : '');
            return obj;
        });
        renderStops(currentData, headers);
    }

    function renderStops(data, headers) {
        const el = document.getElementById("stopList");
        markerGroup.clearLayers();
        el.innerHTML = data.map((c, i) => {
            const name = c[headers[0]] || "No Name";
            const addr = c.Address || "";
            return `<div style="padding:10px; border-bottom:1px solid #eee;">
                <b>${name}</b><br><small>${addr}</small>
            </div>`;
        }).join('');
    }

    window.toggleManagerPanel = function() {
        const p = document.getElementById("managerPanel");
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    };

    window.searchAllRoutes = async function() {
        const term = document.getElementById("mgrSearch").value.toLowerCase();
        if(term.length < 3) return;
        // Logic to scan sub-directories or all loaded files can be expanded here
    };

    window.addEventListener("load", () => {
        initMap();
        fetchRouteList();
    });
})();
</script>

</body>
</html>
