<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Bottle Water Grande Prairie</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        header { background: #004a99; color: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1100; }
        .nav-controls { background: #e9ecef; padding: 12px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #ccc; }
        .info-pill { background: white; border: 1px solid #cbd5e0; padding: 8px 15px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; color: #2d3748; flex-grow: 1; min-height: 20px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .main-view { display: flex; flex: 1; height: calc(100vh - 120px); }
        #map { flex: 7; height: 100%; border-right: 1px solid #ccc; z-index: 1; }
        .sidebar { flex: 3; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .stop-list-container { flex: 1; overflow-y: auto; padding: 15px; background: #fff; }
        .delivery-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; border-left: 5px solid #004a99; transition: 0.2s; }
        .delivery-card:hover { background: #f8fafc; }
        .btn-ui { padding: 10px 18px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 1300px; height: 90vh; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .mgmt-table { width: 100%; border-collapse: collapse; background: white; }
        .mgmt-table th { background: #edf2f7; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e0; position: sticky; top: 0; }
        .mgmt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        #slipPreview { padding: 40px; background: white; color: black; min-height: 800px; }
        .culligan-slip { font-family: Arial, sans-serif; border: 1px solid #ccc; padding: 20px; max-width: 800px; margin: auto; background: #fff; }
        .c-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .c-table th, .c-table td { border: 1px solid #000; padding: 5px; font-size: 0.85rem; }
        .sig-canvas { border: 1px solid #000; background: #fafafa; width: 100%; height: 150px; cursor: crosshair; }
        .red-text { color: #d00; font-weight: bold; }
        .product-selector-row { display: flex; gap: 10px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; }
        .product-select { flex: 2; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        .qty-input { width: 60px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; text-align: center; }
        .del-btn { color: #dc3545; cursor: pointer; margin-left: 10px; font-size: 1rem; }
        .del-btn:hover { color: #a71d2a; }
        /* Unit selector styling */
        .unit-select { padding: 2px; font-size: 0.75rem; border-radius: 3px; border: 1px solid #ccc; }
        @media print { .no-print { display: none !important; } .only-print { display: inline !important; } }
        .only-print { display: none; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="margin:0; font-size:1.6rem;"><i class="fas fa-truck-loading"></i> Culligan Bottle Water Grande Prairie</h1>
        <select id="routeDropdown" onchange="loadSelectedRoute()" style="background:#003366; color:white; border:1px solid #0056b3; padding:8px; border-radius:4px; font-weight:bold;"></select>
    </div>
    <div style="display:flex; gap:12px;">
        <button class="btn-ui" style="background:#6c757d;" onclick="openModal('mgrModal')"><i class="fas fa-user-shield"></i> Manager Portal</button>
        <button class="btn-ui" style="background:#17a2b8;" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
</header>

<div class="nav-controls">
    <button class="btn-ui" style="background: #28a745;" onclick="startRoute()"><i class="fas fa-play"></i> START ROUTE</button>
    <button class="btn-ui" style="background: #dc3545;" onclick="runEndOfDay()"><i class="fas fa-flag-checkered"></i> FINISH</button>
    <div id="activeAddress" class="info-pill">Address: ---</div>
    <div id="activePhone" class="info-pill" style="flex-grow: 0; min-width: 180px;">Phone: ---</div>
    <button class="btn-ui" style="background: #6f42c1;" onclick="optimizeCurrent()"><i class="fas fa-magic"></i> OPTIMIZE</button>
</div>

<div class="main-view">
    <div id="map"></div>
    <div class="sidebar">
        <div style="padding:15px; border-bottom:1px solid #eee; background:#f8fafc;">
            <h3 style="margin:0;">Route Manifest</h3>
        </div>
        <div id="stopList" class="stop-list-container">
            <div style="text-align:center; padding-top:40px; color:#a0aec0;">Select a route to view stops.</div>
        </div>
    </div>
</div>

<div id="mgrModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#004a99; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-tasks"></i> Management Hub</h3>
            <button onclick="closeModal('mgrModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div style="padding:20px; flex:1; overflow-y:auto;">
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 10px; background: #eef2f7; border-radius: 8px;">
                <button class="btn-ui" style="background:#007bff;"><i class="fas fa-users"></i> Customer Maintenance</button>
                <button class="btn-ui" style="background:#f39c12;" onclick="runEndOfDay()"><i class="fas fa-calendar-check"></i> End of Day</button>
                <button class="btn-ui" style="background:#28a745;" onclick="alert('Manual Entry Mode Active')"><i class="fas fa-phone"></i> Call-In Order</button>
                <button class="btn-ui" style="background:#444;" onclick="downloadBackup()"><i class="fas fa-database"></i> Backup</button>
                <div style="margin-left:auto; border:1px solid #ccc; padding:10px; background:white; border-radius:5px; font-size:0.8rem;">
                    <strong>App Settings:</strong><br>
                    <label><input type="checkbox" id="togglePricing" checked onchange="updateSettings()"> Show Pricing</label><br>
                    <label>Tax: <select id="taxType" onchange="updateSettings()">
                        <option value="GST">GST (5%)</option>
                        <option value="PST">PST</option>
                        <option value="HST">HST</option>
                    </select></label>
                </div>
            </div>
            <div style="background:white; border:1px solid #cbd5e0; border-radius:8px; padding:15px;">
                <table class="mgmt-table">
                    <thead><tr><th>Route Name</th><th>Path</th><th>Type</th></tr></thead>
                    <tbody id="mgrTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="stopModal" class="modal-overlay">
    <div class="modal-content">
        <div style="background:#28a745; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;"><i class="fas fa-file-invoice"></i> Delivery Slip</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="clearSignature()" class="btn-ui" style="background:#ffc107; color:#212529;"><i class="fas fa-eraser"></i> Clear Sig</button>
                <button onclick="emailSlip()" class="btn-ui" style="background:#fff; color:#28a745;"><i class="fas fa-envelope"></i> Email</button>
                <button onclick="closeModal('stopModal')" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
            </div>
        </div>
        <div id="slipContent" style="padding:20px; flex:1; overflow-y:auto; background:#f0f2f5;">
            <div class="product-selector-row" style="display:none;">
                <select id="prodSelect1" class="product-select" onchange="syncSlipProducts()"><option value="">-- Select Product 1 --</option></select>
                <input type="number" id="prodQty1" class="qty-input" value="1" onchange="syncSlipProducts()">
                <select id="prodSelect2" class="product-select" onchange="syncSlipProducts()"><option value="">-- Select Product 2 --</option></select>
                <input type="number" id="prodQty2" class="qty-input" value="1" onchange="syncSlipProducts()">
            </div>
            <div id="slipPreview"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map;
    let markers = [];
    const warehouseCoord = [55.1707, -118.7947];
    const REPO_OWNER = "Billyschmidt123";
    const REPO_NAME = "Bottle-Water-1";
    const REPO_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    let sigCanvas, sigCtx, drawing = false;

    let globalProducts = [];
    let appSettings = { showPricing: true, taxLabel: "GST", taxRate: 0.05 };
    let currentStopProducts = [];

    async function initApp() {
        map = L.map('map').setView(warehouseCoord, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(warehouseCoord).addTo(map).bindPopup("<b>Warehouse</b>").openPopup();
        window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
        await loadDynamicRoutes(); 
        await loadProductList(); 
    }

    async function loadProductList() {
        const productFiles = ["Products/Water.csv", "Products/Coffee.csv"];
        try {
            for (const path of productFiles) {
                const res = await fetch(`${REPO_BASE}/${path}`);
                const json = await res.json();
                const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
                const lines = decoded.split(/\r?\n/).filter(l => l.trim() !== '');
                
                /* ADDED: Header detection for unit types */
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                const unitMap = {
                    'case': headers.indexOf('case'),
                    'box': headers.indexOf('box'),
                    'sleeve': headers.indexOf('sleeve'),
                    'bottle': headers.indexOf('bottle') !== -1 ? headers.indexOf('bottle') : headers.indexOf('jug'),
                    'price_case': headers.indexOf('price case'),
                    'price_box': headers.indexOf('price box'),
                    'price_sleeve': headers.indexOf('price sleeve'),
                    'price_bottle': headers.indexOf('price bottle') !== -1 ? headers.indexOf('price bottle') : headers.indexOf('price jug')
                };

                lines.slice(1).forEach(line => {
                    const p = line.split(',');
                    if(p[0]) {
                        /* ADDED: Logic to see which units are available based on header presence and row value */
                        let availableUnits = [];
                        if (unitMap.case !== -1 && p[unitMap.case]) availableUnits.push({label: 'Case', price: parseFloat(p[unitMap.price_case]) || 0});
                        if (unitMap.box !== -1 && p[unitMap.box]) availableUnits.push({label: 'Box', price: parseFloat(p[unitMap.price_box]) || 0});
                        if (unitMap.sleeve !== -1 && p[unitMap.sleeve]) availableUnits.push({label: 'Sleeve', price: parseFloat(p[unitMap.price_sleeve]) || 0});
                        if (unitMap.bottle !== -1 && p[unitMap.bottle]) availableUnits.push({label: 'Bottle', price: parseFloat(p[unitMap.price_bottle]) || 0});

                        globalProducts.push({ 
                            name: p[0].trim(), 
                            size: p[1]?.trim() || '', 
                            price: parseFloat(p[2]) || 0,
                            units: availableUnits
                        });
                    }
                });
            }
            populateDropdowns();
        } catch (e) { console.error("Error loading product files", e); }
    }

    function populateDropdowns() {
        const d1 = document.getElementById('prodSelect1');
        const d2 = document.getElementById('prodSelect2');
        const options = globalProducts.map((p, i) => `<option value="${i}">${p.name} (${p.size})</option>`).join('');
        d1.innerHTML += options;
        d2.innerHTML += options;
    }

    function updateSettings() {
        appSettings.showPricing = document.getElementById('togglePricing').checked;
        appSettings.taxLabel = document.getElementById('taxType').value;
        syncSlipProducts();
    }

    async function loadDynamicRoutes() {
        const dropdown = document.getElementById('routeDropdown');
        const mgrTable = document.getElementById('mgrTableBody');
        try {
            const response = await fetch(`${REPO_BASE}/routes`);
            const contents = await response.json();
            let options = contents.filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.csv'))
                                  .map(o => ({ name: o.name.replace('.csv', ''), path: o.path }));
            dropdown.innerHTML = '<option value="">-- Select Route --</option>' + options.map(o => `<option value="${o.path}">${o.name}</option>`).join('');
            mgrTable.innerHTML = options.map(o => `<tr><td>${o.name}</td><td>${o.path}</td><td>CSV Manifest</td></tr>`).join('');
        } catch (e) { console.error("Error loading routes", e); }
    }

    async function loadSelectedRoute() {
        const filePath = document.getElementById('routeDropdown').value;
        if (!filePath) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        try {
            const res = await fetch(`${REPO_BASE}/${filePath}`);
            const json = await res.json();
            const decoded = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ''))));
            const lines = decoded.split(/\r?\n/).filter(l => l.trim() !== '');
            
            const stops = lines.slice(1).map(line => {
                const parts = line.split(',');
                const combinedAddr = [parts[4], parts[5], parts[6], parts[7]]
                                     .filter(p => p && p.trim() !== '' && p.trim().toUpperCase() !== 'NONE')
                                     .join(' ').trim();
                
                return { 
                    id: parts[0]?.trim(), 
                    address: combinedAddr || parts[1]?.trim(),
                    phone: parts[2]?.trim() || '---',
                    company: parts[3]?.trim() || parts[0]?.trim()
                };
            });
            renderManifest(stops);
        } catch (e) { console.error("Parse error", e); }
    }

    function renderManifest(stops) {
        const stopList = document.getElementById('stopList');
        stopList.innerHTML = "";
        stops.forEach((stop, i) => {
            const lat = warehouseCoord[0] + (Math.random() - 0.5) * 0.1;
            const lng = warehouseCoord[1] + (Math.random() - 0.5) * 0.1;
            const marker = L.marker([lat, lng]).addTo(map);
            markers.push(marker);

            const card = document.createElement('div');
            card.className = 'delivery-card';
            card.innerHTML = `<strong>${i+1}. ${stop.company}</strong><br><small>${stop.address}</small>`;
            card.onclick = () => {
                map.flyTo([lat, lng], 15);
                document.getElementById('activeAddress').innerText = stop.address;
                document.getElementById('activePhone').innerText = stop.phone;
                currentStopProducts = []; 
                openStopSlip(stop);
            };
            stopList.appendChild(card);
        });
        if (markers.length) map.fitBounds(new L.featureGroup(markers).getBounds().pad(0.1));
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function startRoute() { alert("GPS Logging Started."); }
    function runEndOfDay() { if(confirm("Complete today's route?")) location.reload(); }
    function optimizeCurrent() { alert("Route re-sequenced."); }
    function downloadBackup() { alert("Backup system ready."); }

    function syncSlipProducts() {
        const stop = window.currentActiveStop;
        if (stop) openStopSlip(stop);
    }

    function addProductToList(idx) {
        if (idx === "") return;
        const product = globalProducts[idx];
        /* ADDED: Set default price to the first available unit price if list exists */
        const initialPrice = product.units.length > 0 ? product.units[0].price : product.price;
        const initialUnit = product.units.length > 0 ? product.units[0].label : 'Each';
        
        currentStopProducts.push({ 
            ...product, 
            qty: 1, 
            selectedPrice: initialPrice, 
            selectedUnit: initialUnit 
        });
        syncSlipProducts();
    }

    function updateListQty(index, qty) {
        currentStopProducts[index].qty = parseInt(qty) || 0;
        syncSlipProducts();
    }

    /* ADDED: Handle unit selection and price lookup */
    function updateListUnit(index, unitLabel) {
        const product = currentStopProducts[index];
        const unitData = product.units.find(u => u.label === unitLabel);
        if (unitData) {
            product.selectedUnit = unitLabel;
            product.selectedPrice = unitData.price;
            syncSlipProducts();
        }
    }

    function removeProductFromList(index) {
        currentStopProducts.splice(index, 1);
        syncSlipProducts();
    }

    function openStopSlip(stop) {
        window.currentActiveStop = stop; 
        const preview = document.getElementById('slipPreview');
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        
        let rowsHtml = "";
        let subtotal = 0;

        currentStopProducts.forEach((p, index) => {
            const lineTotal = p.selectedPrice * p.qty;
            subtotal += lineTotal;
            
            /* ADDED: Unit dropdown for each line */
            let unitDropdown = `<select class="unit-select no-print" onchange="updateListUnit(${index}, this.value)">`;
            if (p.units.length > 0) {
                p.units.forEach(u => {
                    unitDropdown += `<option value="${u.label}" ${p.selectedUnit === u.label ? 'selected' : ''}>${u.label}</option>`;
                });
            } else {
                unitDropdown += `<option>Each</option>`;
            }
            unitDropdown += `</select>`;

            rowsHtml += `<tr>
                <td><input type="number" class="qty-input no-print" value="${p.qty}" onchange="updateListQty(${index}, this.value)"><span class="only-print">${p.qty}</span></td>
                <td>${p.name} ${p.size}</td>
                <td>
                    ${unitDropdown} <span class="only-print">(${p.selectedUnit})</span>
                    ${appSettings.showPricing ? '$' + p.selectedPrice.toFixed(2) : '--'}
                </td>
                <td>
                    ${appSettings.showPricing ? '$' + lineTotal.toFixed(2) : '--'}
                    <i class="fas fa-times del-btn no-print" onclick="removeProductFromList(${index})"></i>
                </td>
            </tr>`;
        });

        const productOptions = globalProducts.map((p, i) => `<option value="${i}">${p.name} (${p.size})</option>`).join('');

        preview.innerHTML = `
            <div class="culligan-slip">
                <div style="display:flex; justify-content:space-between;">
                    <div>
                        <h2 style="font-size:2.5rem; margin:0; font-family:'Brush Script MT', cursive;">Culligan</h2>
                        <p style="margin:0; font-weight:bold; letter-spacing:2px;">BOTTLED WATER</p>
                    </div>
                    <div style="text-align:right;">
                        <p class="red-text" style="font-size:1.2rem;">DELIVERY SLIP</p>
                        <p class="red-text" style="font-size:1.5rem; border:1px solid #d00; padding:5px;">100131</p>
                    </div>
                </div>
                <div style="display:flex; gap:20px; margin-top:20px;">
                    <div style="flex:1; font-size:0.7rem;">
                        <p>CULLIGAN BOTTLED WATER<br>598316 ALBERTA LTD.<br>12001-99 AVENUE<br>GRANDE PRAIRIE, AB T8W 0J7<br>PHONE: (780) 532-8584</p>
                    </div>
                    <div style="flex:2; border:1px solid #000; padding:10px;">
                        <p><strong>DATE:</strong> ${dateStr}</p>
                        <p><strong>COMPANY:</strong> ${stop.company}<br>${stop.address}</p>
                    </div>
                </div>

                <div class="no-print" style="margin-top: 20px; margin-bottom: 5px;">
                    <select class="product-select" style="width: 100%; border: 2px solid #004a99;" onchange="addProductToList(this.value)">
                        <option value="">-- Select Product to Add --</option>
                        ${productOptions}
                    </select>
                </div>

                <table class="c-table">
                    <thead><tr style="background:#eee;"><th>QTY.</th><th>DESCRIPTION</th><th>UNIT / EACH</th><th>TOTAL</th></tr></thead>
                    <tbody>
                        ${rowsHtml || '<tr><td colspan="4" style="text-align:center; padding:20px;">No Products Added</td></tr>'}
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2">G.S.T. #891131088 RT</td>
                            <td style="background:#eee;">${appSettings.taxLabel}</td>
                            <td>${appSettings.showPricing ? '$' + (subtotal * appSettings.taxRate).toFixed(2) : '--'}</td>
                        </tr>
                        <tr>
                            <td colspan="2"></td>
                            <td style="background:#eee; font-weight:bold;">TOTAL</td>
                            <td style="font-weight:bold;">${appSettings.showPricing ? '$' + (subtotal * (1 + appSettings.taxRate)).toFixed(2) : '--'}</td>
                        </tr>
                    </tfoot>
                </table>
                <div style="margin-top:20px; border-top:2px solid #000;">
                    <p style="font-weight:bold;">CUSTOMER SIGNATURE:</p>
                    <canvas id="signaturePad" class="sig-canvas"></canvas>
                </div>
            </div>`;
        openModal('stopModal');
        initSignaturePad();
    }

    function initSignaturePad() {
        sigCanvas = document.getElementById('signaturePad');
        if (!sigCanvas) return;
        sigCtx = sigCanvas.getContext('2d');
        sigCanvas.width = sigCanvas.offsetWidth;
        sigCanvas.height = sigCanvas.offsetHeight;
        sigCtx.strokeStyle = "#00008b";
        sigCtx.lineWidth = 2;
        const startDrawing = (e) => { drawing = true; sigCtx.beginPath(); };
        const draw = (e) => {
            if (!drawing) return;
            const rect = sigCanvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            sigCtx.lineTo(x, y);
            sigCtx.stroke();
        };
        sigCanvas.addEventListener('mousedown', startDrawing);
        sigCanvas.addEventListener('mousemove', draw);
        sigCanvas.addEventListener('mouseup', () => drawing = false);
        sigCanvas.addEventListener('touchstart', startDrawing);
        sigCanvas.addEventListener('touchmove', draw);
        sigCanvas.addEventListener('touchend', () => drawing = false);
    }

    function clearSignature() { if (sigCtx) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }
    function emailSlip() { html2pdf().from(document.getElementById('slipPreview')).save('Delivery_Slip.pdf'); }
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
