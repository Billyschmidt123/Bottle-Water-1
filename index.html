<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f9; }
        header { background: #004a99; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        .side-panel { width: 350px; background: white; border-left: 1px solid #ccc; display: flex; flex-direction: column; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .panel-header { padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .btn-top { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; position: relative; }
        .driver-nav-bar { background: #e9ecef; padding: 10px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #dee2e6; }
        .info-bar { background: #fff; border: 1px solid #ced4da; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; flex-grow: 1; color: #495057; }
        .btn-nav { padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; }
        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .mgmt-table th, .mgmt-table td { border: 1px solid #eee; padding: 8px; text-align: left; }
        .mgmt-table th { background: #f8f9fa; position: sticky; top: 0; }

        #newCustModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #004a99;
            padding: 20px;
            z-index: 3000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%; max-width: 900px;
        }
        #editModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #004a99;
            padding: 20px;
            z-index: 3000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto;
        }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #004a99; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .cart-box { border: 1px solid #ddd; background: #fdfdfd; padding: 10px; margin-top: 10px; border-radius: 4px; }
        .route-stop-item:hover { background-color: #f0f7ff; }
    </style>
</head>
<body>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
    const token = _k.map(c => String.fromCharCode(c)).join('');
    const repo = 'Billyschmidt123/Bottle-Water-';
    
    let globalCustomers = [];
    let csvHeaders = [];
    let availableRoutes = [];
    let productData = { water: [], coffee: [] };
    let tempCart = [];
    let editCart = [];
    let currentEditIndex = null;

    let waterOptionsHTML = '<option value="">Select Water</option>';
    let coffeeOptionsHTML = '<option value="">Select Coffee</option>';

    async function fetchCSV(path) {
        try {
            return await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { 
                headers: {'Authorization': `token ${token}`} 
            });
        } catch (e) { return null; }
    }

    async function loadProductData() {
        try {
            const wRes = await fetchCSV('Products/Water.csv');
            const cRes = await fetchCSV('Products/Coffee.csv');
            if(wRes && wRes.ok) {
                const wData = await wRes.json();
                const wTxt = await (await fetch(wData.download_url)).text();
                productData.water = wTxt.split('\n').slice(1).filter(l => l.trim());
            }
            if(cRes && cRes.ok) {
                const cData = await cRes.json();
                const cTxt = await (await fetch(cData.download_url)).text();
                productData.coffee = cTxt.split('\n').slice(1).filter(l => l.trim());
            }
            buildGlobalProductOptions();
        } catch(e) { console.warn("Product load skipped."); }
    }

    function buildGlobalProductOptions() {
        waterOptionsHTML = '<option value="">Select Water</option>' + productData.water.map(v => {
            const parts = v.split(',');
            return `<option value="${parts[1]}">${parts[1]}</option>`;
        }).join('');

        coffeeOptionsHTML = '<option value="">Select Coffee</option>' + productData.coffee.map(v => {
            const parts = v.split(',');
            return `<option value="${parts[1]}">${parts[1]}</option>`;
        }).join('');

        document.querySelectorAll('select[data-product-type="water"]').forEach(sel => {
            sel.innerHTML = waterOptionsHTML;
        });
        document.querySelectorAll('select[data-product-type="coffee"]').forEach(sel => {
            sel.innerHTML = coffeeOptionsHTML;
        });
    }

    async function loadAllCustomers() {
    try {
        const r = await fetch(`https://api.github.com/repos/${repo}/contents/routes`, { 
            headers: { 'Authorization': `token ${token}` } 
        });
        const files = r.ok ? await r.json() : [];
        
        // Filter for folders that are strictly UPPERCASE
        const upperCaseFolders = files.filter(f => {
            return f.type === 'dir' && f.name === f.name.toUpperCase();
        });

        // If you are looking for CSV files inside those specific folders:
        availableRoutes = [];
        globalCustomers = [];

        for (let folder of upperCaseFolders) {
            const folderRes = await fetch(folder.url, { 
                headers: { 'Authorization': `token ${token}` } 
            });
            const folderContents = await folderRes.json();

            for (let f of folderContents) {
                if (!f.name.endsWith('.csv')) continue;
                
                availableRoutes.push(f.name);
                const text = await (await fetch(f.download_url + "?t=" + Date.now())).text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                
                // Header and Row Processing Logic...
                if (csvHeaders.length === 0 && lines.length > 0) {
                    csvHeaders = lines[0].split(',').map(h => h.trim());
                    document.getElementById('custTableHead').innerHTML = `<tr><th>Action</th>${csvHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;
                }
                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let rowObj = { "__route": f.name };
                    csvHeaders.forEach((h, i) => rowObj[h] = (vals[i] || "").trim());
                    globalCustomers.push(rowObj);
                });
            }
        }

        // Update UI Dropdowns
        const routeDropdown = document.getElementById('routeDropdown');
        routeDropdown.innerHTML = '<option value="">Select Route</option>' + availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');
        document.getElementById('tableRouteFilter').innerHTML = '<option value="All">All Routes</option>' + availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');

    } catch (e) { 
        console.error("Data load error", e); 
    }
}
    window.renderCustTable = function() {
        const tbody = document.getElementById('custTableBody');
        const filterVal = document.getElementById('tableRouteFilter').value;
        tbody.innerHTML = '';
        let filtered = filterVal === "All" ? globalCustomers : globalCustomers.filter(c => c.__route === filterVal);
        filtered.slice(0, 100).forEach((c) => {
            const gIdx = globalCustomers.indexOf(c);
            let row = `<tr><td><button class="btn-top" style="padding:4px;" onclick="openEdit(${gIdx})">Edit</button></td>`;
            csvHeaders.forEach(h => row += `<td>${c[h] || ''}</td>`);
            tbody.innerHTML += row + '</tr>';
        });
        document.getElementById('tableStatus').innerText = `Displaying ${Math.min(filtered.length, 100)} of ${filtered.length}`;
    };

    // MAPPING HELPERS FOR EDIT MODAL
    function findHeader(possibleNames) {
        for (const name of possibleNames) {
            const h = csvHeaders.find(h => h.toLowerCase() === name.toLowerCase());
            if (h) return h;
        }
        return null;
    }

    const fieldMap = {
        CustomerID: () => findHeader(['CustomerID','Customer ID','CustID']),
        Week: () => findHeader(['Week']),
        Day: () => findHeader(['Day']),
        Company: () => findHeader(['Company','Company Name','Customer Name']),
        Address: () => findHeader(['Address']),
        Location: () => findHeader(['Location']),
        Phone: () => findHeader(['Phone','Phone Number']),
        Notes: () => findHeader(['Notes','Note']),
        Email: () => findHeader(['Email']),
        DeliveryFee: () => findHeader(['Delivery Fee','DeliveryFee']),
        SpecialOrderItem: () => findHeader(['Special Order Item','SpecialOrderItem']),
        Quantity: () => findHeader(['Quantity','Qty']),
        Active: () => findHeader(['Active']),
        TargetRoute: () => findHeader(['Route','Target Route','__route'])
    };

    window.openEdit = function(idx) {
        const record = globalCustomers[idx];
        if (!record) return;
        currentEditIndex = idx;

        const routeSel = document.getElementById('edit_TargetRoute');
        if (routeSel) {
            routeSel.innerHTML = availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        function setVal(id, headerKey) {
            const el = document.getElementById(id);
            if (!el) return;
            const header = fieldMap[headerKey] && fieldMap[headerKey]();
            el.value = header ? (record[header] || '') : '';
        }

        setVal('edit_CustomerID','CustomerID');
        setVal('edit_Week','Week');
        setVal('edit_Day','Day');
        setVal('edit_Company','Company');
        setVal('edit_Address','Address');
        setVal('edit_Location','Location');
        setVal('edit_Phone','Phone');
        setVal('edit_Notes','Notes');
        setVal('edit_Email','Email');
        setVal('edit_DeliveryFee','DeliveryFee');
        setVal('edit_SpecialOrderItem','SpecialOrderItem');
        setVal('edit_Quantity','Quantity');
        setVal('edit_OrderNotes','Notes');

        const activeHeader = fieldMap.Active && fieldMap.Active();
        const activeEl = document.getElementById('edit_Active');
        if (activeEl) {
            activeEl.value = activeHeader ? (record[activeHeader] || 'Yes') : 'Yes';
        }

        const routeHeader = fieldMap.TargetRoute && fieldMap.TargetRoute();
        if (routeSel) {
            const val = routeHeader ? (record[routeHeader] || '') : '';
            routeSel.value = val;
        }

        editCart = [];
        const cartDiv = document.getElementById('edit_CartItems');
        if (cartDiv) cartDiv.innerText = 'No items yet.';

        document.getElementById('editModal').style.display = 'block';
    };

    document.getElementById('btnSaveRecord').onclick = function() {
        if (currentEditIndex == null) {
            document.getElementById('editModal').style.display = 'none';
            return;
        }
        const record = globalCustomers[currentEditIndex];
        if (!record) {
            document.getElementById('editModal').style.display = 'none';
            return;
        }

        function getVal(id) {
            const el = document.getElementById(id);
            return el ? el.value : '';
        }

        function writeBack(headerKey, id) {
            const header = fieldMap[headerKey] && fieldMap[headerKey]();
            if (!header) return;
            record[header] = getVal(id);
        }

        writeBack('CustomerID','edit_CustomerID');
        writeBack('Week','edit_Week');
        writeBack('Day','edit_Day');
        writeBack('Company','edit_Company');
        writeBack('Address','edit_Address');
        writeBack('Location','edit_Location');
        writeBack('Phone','edit_Phone');
        writeBack('Notes','edit_Notes');
        writeBack('Email','edit_Email');
        writeBack('DeliveryFee','edit_DeliveryFee');
        writeBack('SpecialOrderItem','edit_SpecialOrderItem');
        writeBack('Quantity','edit_Quantity');

        const activeHeader = fieldMap.Active && fieldMap.Active();
        if (activeHeader) {
            record[activeHeader] = getVal('edit_Active') || 'Yes';
        }

        const routeHeader = fieldMap.TargetRoute && fieldMap.TargetRoute();
        if (routeHeader) {
            record[routeHeader] = getVal('edit_TargetRoute') || record[routeHeader];
        }

        document.getElementById('editModal').style.display = 'none';
        renderCustTable();
    };

    window.addItemToEditCart = function(type) {
        let item = '';
        let qty = 0;
        let unit = '';

        if (type === 'water') {
            const sel = document.getElementById('edit_WaterProduct');
            const q = document.getElementById('edit_WaterQty');
            const u = document.getElementById('edit_WaterUnits');
            if (!sel || !q || !u) return;
            item = sel.value;
            qty = parseFloat(q.value || '0');
            unit = u.value;
        } else {
            const sel = document.getElementById('edit_CoffeeProduct');
            const q = document.getElementById('edit_CoffeeQty');
            const u = document.getElementById('edit_CoffeeUnits');
            if (!sel || !q || !u) return;
            item = sel.value;
            qty = parseFloat(q.value || '0');
            unit = u.value;
        }

        if (!item) {
            alert("Please select a product first.");
            return;
        }
        if (!qty || qty <= 0) {
            alert("Quantity must be greater than zero.");
            return;
        }

        editCart.push(`${qty} ${unit} - ${item}`);
        const cartDiv = document.getElementById('edit_CartItems');
        if (cartDiv) {
            cartDiv.innerHTML = editCart.map(i => `<div>• ${i}</div>`).join('');
        }
    };

    document.getElementById('btnStartRoute').onclick = async function() {
        const routeFile = document.getElementById('routeDropdown').value;
        if (!routeFile) return;
        if (globalCustomers.length === 0) await loadAllCustomers();

        const filteredStops = globalCustomers.filter(c => c.__route === routeFile);
        document.getElementById('currentRouteTitle').innerText = "Route: " + routeFile;
        
        const stopListEl = document.getElementById('stopList');
        stopListEl.innerHTML = filteredStops.map((s, idx) => {
            const globalIdx = globalCustomers.indexOf(s);
            const displayName = s['Company Name'] || s['Company'] || s['Customer Name'] || 'Unnamed Stop';
            return `
                <div class="route-stop-item" 
                     onclick="window.selectAndEditStop(${globalIdx}, ${idx}, '${routeFile}')"
                     style="padding:12px; border-bottom:1px solid #eee; cursor:pointer;">
                    <strong>${idx + 1}. ${displayName}</strong><br>
                    <small style="color:#666;">${s['Address'] || 'No Address'}</small>
                </div>
            `;
        }).join('');
    };

    window.selectAndEditStop = function(gIdx, rIdx, routeName) {
        const stops = globalCustomers.filter(c => c.__route === routeName);
        const stop = stops[rIdx];
        if (!stop) return;

        document.getElementById('navAddressBar').innerText = "Address: " + (stop['Address'] || '---');
        document.getElementById('navPhoneBar').innerText = "Phone: " + (stop['Phone'] || '---');
        document.getElementById('currentAddress').innerText = stop['Address'] || '---';
        document.getElementById('currentPhone').innerText = stop['Phone'] || '---';

        window.openEdit(gIdx);
    };

    document.getElementById('btnManager').onclick = () => document.getElementById('mgrModal').style.display = 'flex';
    window.handleCustMaintClick = () => renderCustTable();

    window.addEventListener('load', () => {
         loadAllCustomers().then(() => loadProductData());
    });

    let map = L.map('map').setView([55.17, -118.79], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    window.addEventListener('load', function() {
        setTimeout(function() {
            if (typeof map !== 'undefined' && map && typeof map.invalidateSize === 'function') {
                map.invalidateSize();
            }
        }, 500);
    });

    // CALL-IN MODULE LOGIC (UNCHANGED BEHAVIOR)
    window.managerCallInOrder = function() {
        const overlay = document.getElementById('callInModalOverlay');
        if (!overlay) return;

        [
            'callin_CustomerID','callin_Week','callin_Day','callin_Company','callin_Address',
            'callin_Location','callin_Phone','callin_Notes','callin_Email','callin_DeliveryFee',
            'callin_SpecialOrderItem','callin_Quantity','callin_OrderNotes'
        ].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });

        const activeSel = document.getElementById('callin_Active');
        if (activeSel) activeSel.value = 'Yes';

        const qtyEl = document.getElementById('callin_Quantity');
        if (qtyEl) qtyEl.value = 1;

        const routeSel = document.getElementById('callin_TargetRoute');
        if (routeSel) {
            routeSel.innerHTML = availableRoutes.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        tempCart = [];
        const cartDiv = document.getElementById('callin_CartItems');
        if (cartDiv) cartDiv.innerText = 'No items yet.';

        buildGlobalProductOptions();

        overlay.style.display = 'flex';
    };

    window.closeCallInModal = function() {
        const overlay = document.getElementById('callInModalOverlay');
        if (overlay) overlay.style.display = 'none';
    };

    window.addItemToCallInCart = function(type) {
        let item = '';
        let qty = 0;
        let unit = '';

        if (type === 'water') {
            const sel = document.getElementById('callin_WaterProduct');
            const q = document.getElementById('callin_WaterQty');
            const u = document.getElementById('callin_WaterUnits');
            if (!sel || !q || !u) return;
            item = sel.value;
            qty = parseFloat(q.value || '0');
            unit = u.value;
        } else {
            const sel = document.getElementById('callin_CoffeeProduct');
            const q = document.getElementById('callin_CoffeeQty');
            const u = document.getElementById('callin_CoffeeUnits');
            if (!sel || !q || !u) return;
            item = sel.value;
            qty = parseFloat(q.value || '0');
            unit = u.value;
        }

        if (!item) {
            alert("Please select a product first.");
            return;
        }
        if (!qty || qty <= 0) {
            alert("Quantity must be greater than zero.");
            return;
        }

        tempCart.push(`${qty} ${unit} - ${item}`);
        const cartDiv = document.getElementById('callin_CartItems');
        if (cartDiv) {
            cartDiv.innerHTML = tempCart.map(i => `<div>• ${i}</div>`).join('');
        }
    };

    window.saveCallInOrder = function() {
        alert("Call-In order captured in UI. Hook up persistence as needed.");
        closeCallInModal();
    };

    window.openNewCustomerModal = function() {
        const container = document.getElementById('newCustFields');
        if (container && csvHeaders.length > 0) {
            container.innerHTML = csvHeaders.map(h => 
                `<div class="form-group"><label>${h}</label><input type="text" id="new_cust_${h.replace(/\s+/g, '_')}"></div>`
            ).join('');
            document.getElementById('newCustModal').style.display = 'block';
        } else {
            alert("Please wait for customer data to load headers.");
        }
    };

})();
</script>
